function recVocab(i){rec('v'+i,function(heard){if(!heard)return;var s=scoreSpeech(vocab[i].word,heard).stars;vScores[i]=Math.max(vScores[i]||0,s);document.getElementById('v'+i+'-stars').textContent=starStr(s);document.getElementById('v'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';if(vocab.every(function(_,k){return(vScores[k]||0)>=3;}))markCleared('vocab');});}
function disableAll(box){[].forEach.call(box.querySelectorAll('button'),function(x){x.disabled=true;});} function ckEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');} function ckHL(text,tok,cls){var i=text.indexOf(tok);if(i<0)return ckEsc(text);return ckEsc(text.slice(0,i))+'<span class="'+cls+'">'+ckEsc(tok)+'</span>'+ckEsc(text.slice(i+tok.length));}
function ckTokens(text){return String(text).match(/[A-Za-z0-9']+|[^\sA-Za-z0-9']/g)||[];}
var CH={}; function Challenge(key,bodyId,build){this.key=key;this.bodyId=bodyId;this.build=build;CH[key]=this;} Challenge.prototype.start=function(){this.qs=this.build();this.order=shuffle(this.qs.map(function(_,i){return i;}));this.phase='answer';this.pos=0;this.correct=0;this.total=this.qs.length;this.wrong=[];this._render();}; Challenge.prototype._render=function(){var self=this,b=document.getElementById(this.bodyId);if(this.phase==='answer'){if(this.pos>=this.order.length){if(this.wrong.length===0){this._congrats();return;}b.innerHTML='<div class="card" style="text-align:center"><div class="big">✅ 作答已完成！</div><div class="zh">答對 '+this.correct+' / '+this.total+'　還有 '+this.wrong.length+' 題要再練習一次</div><button class="next" id="ch-retry">開始錯題挑戰 →</button></div>';b.querySelector('#ch-retry').onclick=function(){self.phase='retry';self.pos=0;self._render();};return;}this._ask(this.qs[this.order[this.pos]],'answer');return;}if(this.wrong.length===0){this._congrats();return;}if(this.pos>=this.wrong.length)this.pos=0;this._ask(this.wrong[this.pos],'retry');}; Challenge.prototype._ask=function(q,phase){var self=this,b=document.getElementById(this.bodyId);var head=(phase==='answer')?'<div class="zh">第 '+(this.pos+1)+' / '+this.total+' 題　答對 '+this.correct+'</div>':'<div class="zh">🔁 錯題挑戰　還有 '+this.wrong.length+' 題</div>';b.innerHTML='<div class="card" style="text-align:center">'+head+'<div class="ch-q"></div><div class="out ch-out"></div><div class="ch-foot"></div></div>';var settled=false;q.mount(b.querySelector('.ch-q'),b.querySelector('.ch-out'),phase,function(firstTryCorrect){if(settled)return;settled=true;if(phase==='answer'){if(firstTryCorrect)self.correct++;else self.wrong.push(q);}else{var w=self.wrong.indexOf(q);if(w>=0)self.wrong.splice(w,1);}var foot=b.querySelector('.ch-foot');foot.innerHTML='<button class="next">下一題 →</button>';foot.querySelector('button').onclick=function(){if(phase==='answer')self.pos++;self._render();};});}; Challenge.prototype._congrats=function(){document.getElementById(this.bodyId).innerHTML='<div class="card" style="text-align:center"><div class="big">🎉 恭喜完成！</div><div class="zh">這一關全部過關啦 ✨</div><div class="row" style="justify-content:center"><button class="act start" onclick="CH[\''+this.key+'\'].start()">再玩一次</button></div></div>';markCleared(this.key);};
function qMatch(t){return{mount:function(qEl,outEl,phase,settle){var firstTry=true;var opts=shuffle([t].concat(shuffle(vocab.map(function(_,i){return i;}).filter(function(i){return i!==t;})).slice(0,3)));qEl.innerHTML='<div class="big" style="font-size:40px">👂</div><div class="en">聽一聽，這是哪個字？</div><div class="row" style="justify-content:center"><button class="act listen" id="m-listen">🔊 再聽一次</button></div><div class="game-grid" id="m-grid">'+opts.map(function(i){return '<button class="opt gem" data-i="'+i+'">'+vocab[i].word+'</button>';}).join('')+'</div>';document.getElementById('m-listen').onclick=function(){speak(vocab[t].word,'together');};var grid=document.getElementById('m-grid');grid.onclick=function(e){var btn=e.target.closest('button[data-i]');if(!btn||btn.disabled)return;var i=+btn.dataset.i;if(i===t){outEl.textContent='✅ 答對了！'+vocab[t].word+'（'+vocab[t].zh+'）';disableAll(grid);speak(vocab[t].word,'together');settle(firstTry);}else{firstTry=false;outEl.textContent='❌ 你點的是「'+vocab[i].word+'」，正確答案再聽一次';speak(vocab[i].word,'together',function(){speak(vocab[t].word,'together');});}};setTimeout(function(){autoSpeak(vocab[t].word,'together');},250);}};}
function spellLetters(word){return String(word).toLowerCase().replace(/[^a-z ]/g,'').split('');}
function qSpell(t){return{mount:function(qEl,outEl,phase,settle){var firstTry=true,w=vocab[t],letters=spellLetters(w.word);qEl.innerHTML='<div class="big" style="font-size:40px">✏️</div><div class="en">聽單字，填字母</div><div class="zh">'+w.zh+'</div><div class="row" style="justify-content:center"><button class="act listen" id="sp-listen">🔊 再聽一次</button></div><div class="spell-boxes" id="sp-boxes">'+letters.map(function(ch,i){return ch===' '?'<span class="spell-space">·</span>':'<input class="spell-cell" maxlength="1" data-i="'+i+'" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text">';}).join('')+'</div><div class="row" style="justify-content:center"><button class="next" id="sp-check">檢查答案</button></div>';function play(){speak(w.word,'together');}document.getElementById('sp-listen').onclick=play;var box=document.getElementById('sp-boxes');var inputs=[].slice.call(box.querySelectorAll('input'));inputs.forEach(function(inp,idx){inp.oninput=function(){inp.value=inp.value.replace(/[^a-zA-Z]/g,'').toLowerCase().slice(0,1);inp.classList.remove('bad');if(inp.value&&inputs[idx+1])inputs[idx+1].focus();};inp.onkeydown=function(e){if(e.key==='Backspace'&&!inp.value&&inputs[idx-1])inputs[idx-1].focus();};});if(inputs[0])inputs[0].focus();document.getElementById('sp-check').onclick=function(){var ok=true;inputs.forEach(function(inp){var i=+inp.dataset.i;if((inp.value||'').toLowerCase()!==letters[i]){ok=false;inp.classList.add('bad');inp.value='';}});if(ok){outEl.textContent='✅ 拼對了！'+w.word+'（'+w.zh+'）';inputs.forEach(function(inp){inp.disabled=true;});speak(w.word,'together');settle(firstTry);}else{firstTry=false;outEl.textContent='❌ 有字母不對，再聽一次、再填一次';play();var first=inputs.find(function(inp){return !inp.value;});if(first)first.focus();}};setTimeout(function(){autoSpeak(w.word,'together');},250);}};}
function qTalk(pi){var pair=talkPairs[pi];return{mount:function(qEl,outEl,phase,settle){var firstTry=true;var opts=shuffle([pair.a].concat(pair.d));qEl.innerHTML='<div class="en">'+pair.q+'</div><div class="row" style="justify-content:center"><button class="act listen" id="t-listen">🔊 再聽一次</button></div><div class="zh">該怎麼回答？👇</div><div id="t-opts">'+opts.map(function(o,k){return '<button class="opt wide" data-k="'+k+'">'+o+'</button>';}).join('')+'</div>';document.getElementById('t-listen').onclick=function(){speak(pair.q,'sam');};var box=document.getElementById('t-opts');box.onclick=function(e){var btn=e.target.closest('button[data-k]');if(!btn||btn.disabled)return;var o=opts[+btn.dataset.k];if(o===pair.a){outEl.textContent='✅ 答對了！';disableAll(box);speak(pair.a,'ann');settle(firstTry);}else{firstTry=false;outEl.textContent='❌ 你選的是「'+o+'」，再試試看';speak(o,'ann',function(){speak(pair.q,'sam');});}};setTimeout(function(){autoSpeak(pair.q,'sam');},250);}};}
function qCheck(ci){var it=checkItems[ci];return{mount:function(qEl,outEl,phase,settle){var firstTry=true;qEl.innerHTML='<div class="en">「'+ckEsc(it.text)+'」</div><div class="zh">這句寫得對嗎？</div><div class="row" id="c-row" style="justify-content:center;margin-top:6px"><button class="opt" data-v="1">⭕ 對</button><button class="opt gem" data-v="0">❌ 錯</button></div><div class="reveal" id="c-reveal"></div>';var reveal=document.getElementById('c-reveal');function showFix(){reveal.innerHTML='<div style="color:var(--green);font-weight:900;font-size:18px">✅ 找到了！</div><div class="reveal">錯在紅色的地方<br><span class="sent">'+ckHL(it.text,it.bad,'err')+'</span><br>✏️ 正確要寫成：<br><span class="sent">'+ckHL(it.correct,it.fixTok,'fixh')+'</span><br><small style="color:var(--muted)">'+it.fix+'</small></div>';}function startDrill(intro){var toks=ckTokens(it.text),badIdx=-1;for(var i=0;i<toks.length;i++){if(toks[i]===it.bad){badIdx=i;break;}}if(badIdx<0){showFix();settle(firstTry);return;}reveal.innerHTML='<div class="zh" style="font-weight:900">'+intro+'</div><div class="zh">點一下你覺得寫錯的地方（每個字和標點都看一看）</div><div class="game-grid" id="c-toks">'+toks.map(function(t,k){return '<button class="opt gem" data-ti="'+k+'">'+ckEsc(t)+'</button>';}).join('')+'</div>';var grid=document.getElementById('c-toks');grid.onclick=function(e){var btn=e.target.closest('button[data-ti]');if(!btn||btn.disabled)return;var k=+btn.dataset.ti;if(k===badIdx){disableAll(grid);showFix();settle(firstTry);}else{firstTry=false;btn.disabled=true;btn.style.opacity=.35;outEl.textContent='🔍 不是這個，再找找看';}};}var row=document.getElementById('c-row');row.onclick=function(e){var btn=e.target.closest('button[data-v]');if(!btn||btn.disabled)return;var saysOk=(btn.dataset.v==='1');if(it.ok){if(saysOk){disableAll(row);reveal.innerHTML='<div style="color:var(--green);font-weight:900;font-size:18px">✅ 答對了！</div><div class="reveal">這句寫得<b>對</b><br><span class="sent">'+ckEsc(it.text)+'</span></div>';settle(true);}else{if(phase==='retry'){outEl.textContent='❌ 再想想看，這句其實沒問題';return;}disableAll(row);reveal.innerHTML='<div style="color:#e11d48;font-weight:900;font-size:18px">❌ 其實這句是對的喔</div><div class="reveal"><span class="sent">'+ckEsc(it.text)+'</span></div>';settle(false);}}else{if(saysOk){if(phase==='retry'){outEl.textContent='❌ 再想想，這句其實有地方寫錯囉';return;}disableAll(row);firstTry=false;startDrill('這句其實有地方寫錯囉，一起來找找看！');}else{disableAll(row);startDrill('沒錯！這句怪怪的～那…錯在哪裡？');}}};}};}
function qStemWord(t){return{mount:function(qEl,outEl,phase,settle){var firstTry=true;qEl.innerHTML='<div class="en" style="font-size:19px;line-height:1.4">"'+stemWords[t].en+'"</div><div class="row" style="justify-content:center"><button class="act listen" id="s-listen">🔊 再聽一次</button></div><div class="zh">這句話在說哪個字？👇</div><div class="game-grid" id="s-grid">'+shuffle(stemWords.map(function(_,i){return i;})).map(function(i){return '<button class="opt gem" data-i="'+i+'">'+stemWords[i].word+'</button>';}).join('')+'</div>';document.getElementById('s-listen').onclick=function(){speak(stemWords[t].en,'together');};var grid=document.getElementById('s-grid');grid.onclick=function(e){var btn=e.target.closest('button[data-i]');if(!btn||btn.disabled)return;var i=+btn.dataset.i;if(i===t){outEl.textContent='✅ 答對了！'+stemWords[t].word+' = '+stemWords[t].zh;disableAll(grid);speak(stemWords[t].word,'together');settle(firstTry);}else{firstTry=false;outEl.textContent='❌ 你選的是「'+stemWords[i].word+'」。中文提示：'+stemWords[t].desc;speak(stemWords[t].en,'together');}};setTimeout(function(){autoSpeak(stemWords[t].en,'together');},250);}};}
new Challenge('spell','body-spell',function(){return vocab.map(function(_,i){return qSpell(i);});}); new Challenge('match','body-match',function(){return vocab.map(function(_,i){return qMatch(i);});}); new Challenge('talk','body-talk',function(){return talkPairs.map(function(_,i){return qTalk(i);});}); new Challenge('check','body-check',function(){return checkItems.map(function(_,i){return qCheck(i);});}); new Challenge('stem','body-stem',function(){return stemWords.map(function(_,i){return qStemWord(i);});});
buildShell();buildDialog();buildVocab();CH.spell.start();CH.match.start();CH.talk.start();CH.check.start();CH.stem.start();renderDots();STAGES.forEach(function(s){markStageUI(s.key);});checkAllDone();if(window.speechSynthesis)speechSynthesis.getVoices();document.addEventListener('pointerdown',primeVoice,true);document.addEventListener('touchstart',primeVoice,true);
