<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>貝兒美語練習</title>
  <style>
    :root{
      --ink:#2c2433; --muted:#817387; --line:#f0d9e6;
      --accent:#e85a9b; --accent-dark:#c23d7d; --gem:#43b3e0; --gem-dark:#237fa9;
      --paper:#fffdf8; --green:#3aa66b; --sky:#e3f3fb;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--ink); padding:18px 14px 50px;
      font-family:ui-rounded,"SF Pro Rounded","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(232,90,155,.10), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(67,179,224,.13), transparent 32%),
        linear-gradient(180deg,#fffdf8,#fdf3f8);
    }
    .wrap{max-width:920px;margin:0 auto}
    header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    h1{margin:0;color:var(--accent-dark);font-size:clamp(28px,7vw,46px);letter-spacing:0}
    .sub{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.5}
    .date{color:var(--gem-dark);font-weight:900;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
    .series{margin:18px 0 24px}
    .series-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    h2{margin:0;color:var(--gem-dark);font-size:22px}
    .count{color:var(--muted);font-size:13px;font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
    .unit{border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px;box-shadow:0 3px 10px rgba(180,120,150,.07)}
    .unit h3{margin:0 0 6px;color:var(--accent-dark);font-size:19px;line-height:1.25}
    .topic{color:var(--ink);font-weight:850;min-height:24px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    a.btn{display:grid;place-items:center;min-height:46px;border-radius:10px;text-decoration:none;font-weight:950}
    a.pre{color:var(--gem-dark);background:var(--sky);border:1px solid #c7e9f7}
    a.rev{color:#fff;background:var(--accent)}
    .empty{border:1px dashed var(--line);border-radius:14px;background:rgba(255,255,255,.72);padding:18px;color:var(--muted);font-weight:800}
    .hint{margin-top:22px;color:var(--muted);font-size:13px;line-height:1.6}
    .book-emoji{font-size:22px;margin-right:6px}
    .reader{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid var(--accent);color:var(--accent-dark);border-radius:999px;padding:5px 12px;font-weight:900;font-size:15px;white-space:nowrap}
    .series-head .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .unit.soon{background:repeating-linear-gradient(135deg,#fff,#fff 9px,#fbf1f6 9px,#fbf1f6 18px);border-style:dashed}
    .unit.soon h3{color:var(--muted)}
    .soon-tag{display:inline-block;margin-top:10px;color:var(--muted);font-weight:900;font-size:13px}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>💎 貝兒美語練習</h1>
      <p class="sub">課前先聽一聽，課後再闖關。用 iPad Chrome 分頁開，複習頁第一次要允許麥克風。</p>
    </div>
    <div class="date" id="updated">更新中</div>
  </header>
  <main id="app"></main>
  <p class="hint">若頁面沒聲音，先把媒體音量調大，再點一次「聽」。若語音評分收不到聲音，請確認不是加入主畫面的獨立 App 模式。</p>
</div>
<script>
var FALLBACK={
  updated:"2026-06-28",
  readers:[
    {name:"小鑽石",emoji:"👧",series:"teamms1"},
    {name:"光哥",emoji:"👦",series:"teamms2"}
  ],
  series:[
    {id:"teamms1",title:"第一冊",subtitle:"TEAMMS Book 1 · 全 12 課，陸續上線",total:12,units:[
      {n:1,topic:"Hello! How are you?",preview:"TEAMMS-1/lesson1-pre.html?v=teamms1-u1-20260628",review:"TEAMMS-1/lesson1-review.html?v=teamms1-u1-20260628"},
      {n:2,topic:"Sit down, please.",preview:"TEAMMS-1/lesson2-pre.html?v=teamms1-u2-20260628",review:"TEAMMS-1/lesson2-review.html?v=teamms1-u2-20260628"},
      {n:3,topic:"Who is she?",preview:"TEAMMS-1/lesson3-pre.html?v=teamms1-u3-20260628",review:"TEAMMS-1/lesson3-review.html?v=teamms1-u3-20260628"},
      {n:4,topic:"What is it?",preview:"TEAMMS-1/lesson4-pre.html?v=teamms1-u4-20260628",review:"TEAMMS-1/lesson4-review.html?v=teamms1-u4-20260628"},
      {n:5,topic:"Do you have a dog?",preview:"TEAMMS-1/lesson5-pre.html?v=teamms1-u5-20260628",review:"TEAMMS-1/lesson5-review.html?v=teamms1-u5-20260628"},
      {n:6,topic:"What do you have?",preview:"TEAMMS-1/lesson6-pre.html?v=teamms1-u6-20260628",review:"TEAMMS-1/lesson6-review.html?v=teamms1-u6-20260628"}
    ]},
    {id:"teamms2",title:"第二冊",subtitle:"TEAMMS Book 2 · 全 12 課，陸續上線",total:12,units:[
      {n:7,topic:"Where Are You?",preview:"TEAMMS-2/lesson7-pre.html?v=teamms2-u7-20260628",review:"TEAMMS-2/lesson7-review.html?v=teamms2-u7-20260628"},
      {n:8,topic:"Where Is Dad?",preview:"TEAMMS-2/lesson8-pre.html?v=teamms2-u8-20260628",review:"TEAMMS-2/lesson8-review.html?v=teamms2-u8-20260628"},
      {n:9,topic:"Where Is My Cat?",preview:"TEAMMS-2/lesson9-pre.html?v=teamms2-u9-20260628",review:"TEAMMS-2/lesson9-review.html?v=teamms2-u9-20260628"},
      {n:10,topic:"Do You Want to Play on the Seesaw?",preview:"TEAMMS-2/lesson10-pre.html?v=teamms2-u10-20260628",review:"TEAMMS-2/lesson10-review.html?v=teamms2-u10-20260628"},
      {n:11,topic:"This Is My Father",preview:"TEAMMS-2/lesson11-pre.html?v=teamms2-u11-20260628",review:"TEAMMS-2/lesson11-review.html?v=teamms2-u11-20260628"},
      {n:12,topic:"What Do You See?",preview:"TEAMMS-2/lesson12-pre.html?v=teamms2-u12-20260628",review:"TEAMMS-2/lesson12-review.html?v=teamms2-u12-20260628"}
    ]}
  ]
};
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");}
var BOOK_EMOJI=["📘","📗","📙","📕","📓","📔"];
function render(data){
  document.getElementById("updated").textContent="更新 "+(data.updated||"");
  var readers=data.readers||[];
  document.getElementById("app").innerHTML=(data.series||[]).map(function(series,si){
    var units=series.units||[];
    var total=series.total||units.length;
    // 本冊現在是誰在讀（小孩是「指標」，升冊只要改 diamond-units.json 的 readers）
    var here=readers.filter(function(r){return r.series===series.id;});
    var badge=here.map(function(r){return '<span class="reader"><span class="who">'+esc(r.emoji||"🙂")+' '+esc(r.name)+'</span> 現在在這冊</span>';}).join('');
    // 把已上線的課做成查表，整冊 1..total 都排出來，沒做的顯示「準備中」
    var byN={}; units.forEach(function(u){byN[u.n]=u;});
    var cells=[];
    for(var n=1;n<=total;n++){
      var u=byN[n];
      if(u){
        cells.push('<article class="unit"><h3>Lesson '+u.n+'</h3><div class="topic">'+esc(u.topic)+'</div><div class="actions">'
          +'<a class="btn pre" href="'+esc(u.preview)+'">課前預習</a>'
          +'<a class="btn rev" href="'+esc(u.review)+'">複習闖關</a>'
          +'</div></article>');
      } else {
        cells.push('<article class="unit soon"><h3>Lesson '+n+'</h3><div class="topic">　</div><div class="soon-tag">🚧 準備中，之後補上</div></article>');
      }
    }
    return '<section class="series"><div class="series-head"><div>'
        +'<h2><span class="book-emoji">'+(BOOK_EMOJI[si]||"📘")+'</span>'+esc(series.title)+'</h2>'
        +'<div class="meta">'+(badge||'')+'<span class="sub">'+esc(series.subtitle||"")+'</span></div>'
      +'</div><div class="count">已上線 '+units.length+' / '+total+' 課</div></div>'
      +'<div class="grid">'+cells.join('')+'</div>'
      +'</section>';
  }).join('');
}
fetch("diamond-units.json?t="+Date.now(),{cache:"no-store"}).then(function(r){
  if(!r.ok) throw new Error("units "+r.status);
  return r.json();
}).then(render).catch(function(){render(FALLBACK);});
</script>
</body>
</html>
