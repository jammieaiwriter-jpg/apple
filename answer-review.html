<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple 錯題答案核對表</title>
  <style>
    :root { --primary:#ff6b6b; --secondary:#4ecdc4; --bg:#f4f7fb; --text:#2f3e46; --line:#dde5ee; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; z-index: 5; background: rgba(244,247,251,.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 12px; }
    .bar { max-width: 1100px; margin: 0 auto; display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    h1 { font-size: 1.25rem; margin: 0; }
    .status { color: #64748b; font-size: .9rem; }
    main { max-width: 1100px; margin: 0 auto; padding: 14px; display: grid; gap: 14px; }
    .card { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 12px; display: grid; grid-template-columns: minmax(260px, 1.25fr) minmax(260px, .9fr); gap: 14px; }
    .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .badge { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; border-radius: 999px; padding: 3px 8px; font-size: .78rem; font-weight: 700; }
    .file { color: #64748b; font-size: .82rem; word-break: break-all; }
    img { width: 100%; max-height: 520px; object-fit: contain; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .panel { display: flex; flex-direction: column; gap: 10px; }
    label { font-size: .82rem; color: #64748b; }
    input, textarea, select { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; font-size: 1rem; font-family: inherit; }
    textarea { min-height: 72px; resize: vertical; }
    .quick { display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: 1px solid var(--line); background: white; color: var(--text); border-radius: 8px; padding: 9px 12px; cursor: pointer; font-weight: 650; }
    button:hover { border-color: var(--secondary); }
    .primary { background: var(--primary); border-color: var(--primary); color: white; }
    .secondary { background: var(--secondary); border-color: var(--secondary); color: white; }
    .old { color: #64748b; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 8px; font-size: .9rem; }
    .changed { border-color: #fbbf24; background: #fffbeb; }
    dialog { width: min(920px, calc(100vw - 24px)); border: 0; border-radius: 8px; padding: 0; }
    dialog::backdrop { background: rgba(15,23,42,.35); }
    .dialog-body { padding: 14px; display: grid; gap: 10px; }
    #exportText { min-height: 360px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85rem; }
    @media (max-width: 760px) {
      .card { grid-template-columns: 1fr; }
      header { position: static; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Apple 錯題答案核對表</h1>
        <div class="status" id="statusText">載入中</div>
      </div>
      <div class="quick">
        <button class="secondary" onclick="exportAnswers()">匯出答案</button>
        <button onclick="copySummary()">複製簡短格式</button>
        <button onclick="clearDraft()">清除草稿</button>
      </div>
    </div>
  </header>
  <main id="list"></main>

  <dialog id="exportDialog">
    <div class="dialog-body">
      <strong>把下面這段貼回聊天給我，我就能批次更新答案。</strong>
      <textarea id="exportText"></textarea>
      <div class="quick">
        <button class="primary" onclick="copyExport()">複製</button>
        <button onclick="document.getElementById('exportDialog').close()">關閉</button>
      </div>
    </div>
  </dialog>

  <script>
    const QUESTIONS = [
      {"id":1,"file":"截圖 2026-04-26 下午6.12.54.png","current":"3","hint":"19變17是少了2，17變15又少了2，所以15少2會變成多少呢？答案是13喔！"},
      {"id":2,"file":"截圖 2026-04-26 下午6.13.26.png","current":"10 12 12 15 16","hint":"一格一格看清楚，每個空格都要照順序填；填完後再從頭讀一次，檢查數字是不是接得合理。"},
      {"id":3,"file":"截圖 2026-04-26 下午6.13.41.png","current":"3","hint":"看看左邊積木缺了一個角，哪個積木轉過來剛好可以補滿呢？這題媽媽確認答案是第3個。"},
      {"id":4,"file":"截圖 2026-04-26 下午6.14.08.png","current":"右 左 中 右 中","hint":"照題目的順序一個一個判斷位置：先分清楚左、右、中，再把答案照順序填上。"},
      {"id":5,"file":"截圖 2026-04-26 下午6.14.37.png","current":"左 右","hint":"先看第一個位置，再看第二個位置；不要一起猜，照順序判斷左邊和右邊。"},
      {"id":6,"file":"截圖 2026-04-26 下午6.15.09.png","current":"3","hint":"左邊有7元，右邊有20元。20元比7元多了13元喔！"},
      {"id":7,"file":"截圖 2026-04-26 下午6.15.19.png","current":"2","hint":"4變8是多了4，8再多4就是12喔！"},
      {"id":8,"file":"截圖 2026-04-26 下午6.15.35.png","current":"中 右 左 左 中","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":9,"file":"截圖 2026-04-26 下午6.18.32.png","current":"1","hint":"想一想，什麼數字減去4會變成6呢？反過來算，6+4等於多少呢？"},
      {"id":10,"file":"截圖 2026-04-26 晚上9.39.04.png","current":"4","hint":"中間有一個圓圓的洞，要找哪一個積木才能剛好塞進去呢？"},
      {"id":11,"file":"截圖 2026-04-26 晚上9.39.28.png","current":"3","hint":"我們一起慢慢數：10+10是20，再加上三個5元(15元)，最後加1元，總共是多少呢？"},
      {"id":12,"file":"截圖 2026-04-26 晚上9.40.04.png","current":"1","hint":"20變15是少了5，那15再少5會變成多少呢？"},
      {"id":13,"file":"截圖 2026-04-26 晚上9.40.14.png","current":"3","hint":"找找看，哪一個數字的尾巴是0、2、4、6、8呢？那樣就是雙數喔！"},
      {"id":14,"file":"截圖 2026-04-26 晚上9.40.27.png","current":"5 1 9 6/30 3/30","hint":"看第4個鐘，短針在6和7中間，長針指著6，所以是6點『半』喔，也就是30分！"},
      {"id":15,"file":"截圖 2026-04-27 晚上9.31.37.png","current":"3","hint":"看看左邊的形狀，缺了哪些方格才能變成完整的正方形呢？選出可以補上去的那一塊！"},
      {"id":16,"file":"截圖 2026-04-27 晚上9.31.52.png","current":"2","hint":"一雙筷子有 2 支，那 6 雙筷子我們可以用 2, 4, 6... 這樣跳著數數看喔！"},
      {"id":17,"file":"截圖 2026-04-27 晚上9.32.03.png","current":"4","hint":"觀察數字的規律：17到20加了3，20到23也加了3。那11加3會是多少呢？"},
      {"id":18,"file":"截圖 2026-04-27 晚上9.32.21.png","current":"右 左 中 左 中","hint":"伸出妳的右手比比看，哪一個手勢或鞋子的方向跟妳的右手邊是一樣的？"},
      {"id":19,"file":"截圖 2026-04-27 晚上9.32.39.png","current":"","hint":"細心地一個一個數，可以用手指頭點著螢幕數，把每一種形狀的數量找出來喔！"},
      {"id":20,"file":"截圖 2026-04-28 晚上9.12.35.png","current":"3","hint":"把左邊缺掉的那一塊形狀記在心裡，再去比對哪一個選項的形狀跟缺口剛好一樣！可以用手指描出缺口的形狀再找答案喔。"},
      {"id":21,"file":"截圖 2026-04-28 晚上9.13.05.png","current":"左","hint":"注意每個圓被切成幾份？哪些部分是灰色的？找出跟左邊一模一樣的分法！可以先看灰色佔了幾格，再去比對選項喔。"},
      {"id":22,"file":"截圖 2026-05-05 晚上10.08.58.png","current":"","hint":"這題先標成待確認，等答案補齊後再正式練習。"},
      {"id":23,"file":"截圖 2026-05-05 晚上10.09.55.png","current":"","hint":"這張和前面的錯題重複，先不用再做一次。","note":"重複"},
      {"id":24,"file":"截圖 2026-05-05 晚上10.11.52.png","current":"","hint":"這題先標成待確認，等答案補齊後再正式練習。"},
      {"id":25,"file":"截圖 2026-05-05 晚上10.12.30.png","current":"左 右","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":26,"file":"截圖 2026-05-05 晚上10.12.59.png","current":"右 中 左 中 右","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":27,"file":"截圖 2026-05-22 晚上8.20.55.png","current":"5 20","hint":"照題目順序把每一格答案填好；填完後從頭檢查一次。"},
      {"id":28,"file":"截圖 2026-05-22 晚上8.21.22.png","current":"1 3","hint":"照題目順序把每一格答案填好；填完後從頭檢查一次。"},
      {"id":29,"file":"截圖 2026-05-22 晚上8.21.40.png","current":"左 右 中 左 中","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":30,"file":"截圖 2026-05-22 晚上8.21.53.png","current":"中 左 右 右 中","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":31,"file":"截圖 2026-05-22 晚上8.23.18.png","current":"右 左 左 中 右","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":32,"file":"截圖 2026-05-22 晚上8.23.39.png","current":"右 中","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"},
      {"id":33,"file":"截圖 2026-05-22 晚上8.23.55.png","current":"左 右 中 左 中","hint":"照題目的順序一個一個判斷位置，再把左、右、中依序填上。"}
    ];
    const STORAGE_KEY = 'apple_answer_review_draft';
    let answers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

    function render() {
      const list = document.getElementById('list');
      list.innerHTML = QUESTIONS.map(q => {
        const value = answers[q.id]?.answer ?? q.current ?? '';
        const note = answers[q.id]?.note ?? '';
        const changed = normalize(value) !== normalize(q.current || '');
        const src = `錯題/${encodeURIComponent(q.file)}`;
        return `
          <section class="card ${changed ? 'changed' : ''}" id="q${q.id}">
            <div>
              <div class="meta">
                <span class="badge">第 ${q.id} 題</span>
                <span class="file">${q.file}</span>
              </div>
              <img src="${src}" alt="第 ${q.id} 題">
            </div>
            <div class="panel">
              <div class="old">目前系統答案：${q.current ? escapeHtml(q.current) : '尚未填'}</div>
              <div>
                <label>確認答案</label>
                <input value="${escapeAttr(value)}" oninput="setAnswer(${q.id}, this.value)" placeholder="例如：3 或 10 12 12 15 16">
              </div>
              <div class="quick">
                ${[1,2,3,4].map(n => `<button onclick="setAnswer(${q.id}, '${n}')">${n}</button>`).join('')}
                <button onclick="setAnswer(${q.id}, '左')">左</button>
                <button onclick="setAnswer(${q.id}, '右')">右</button>
                <button onclick="setAnswer(${q.id}, '中')">中</button>
                <button onclick="markDispute(${q.id})">有疑問</button>
                <button onclick="clearOne(${q.id})">清空</button>
              </div>
              <div>
                <label>備註或異議</label>
                <textarea oninput="setNote(${q.id}, this.value)" placeholder="例如：選項看起來像第3個，不確定">${escapeHtml(note)}</textarea>
              </div>
            </div>
          </section>
        `;
      }).join('');
      updateStatus();
    }

    function normalize(value) {
      return String(value || '').trim().replace(/[，,、]/g, ' ').replace(/\s+/g, ' ');
    }
    function setAnswer(id, value) {
      answers[id] = { ...(answers[id] || {}), answer: value };
      save();
      updateStatus();
      document.querySelector(`#q${id}`)?.classList.toggle('changed', normalize(value) !== normalize(QUESTIONS[id - 1].current || ''));
    }
    function setNote(id, value) {
      answers[id] = { ...(answers[id] || {}), note: value };
      save();
    }
    function markDispute(id) {
      answers[id] = { ...(answers[id] || {}), note: '有疑問，需要再確認' };
      save();
      render();
    }
    function clearOne(id) {
      answers[id] = { answer: '', note: answers[id]?.note || '' };
      save();
      render();
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
    }
    function updateStatus() {
      const filled = QUESTIONS.filter(q => normalize(answers[q.id]?.answer ?? q.current)).length;
      const changed = QUESTIONS.filter(q => normalize(answers[q.id]?.answer ?? q.current) !== normalize(q.current || '')).length;
      document.getElementById('statusText').textContent = `已填 ${filled} / ${QUESTIONS.length} 題，修改 ${changed} 題`;
    }
    function buildPayload() {
      return QUESTIONS.map(q => ({
        id: q.id,
        file: q.file,
        oldAnswer: q.current || '',
        answer: normalize(answers[q.id]?.answer ?? q.current),
        note: answers[q.id]?.note || ''
      }));
    }
    function exportAnswers() {
      document.getElementById('exportText').value = JSON.stringify(buildPayload(), null, 2);
      document.getElementById('exportDialog').showModal();
    }
    function copySummary() {
      const text = buildPayload().map(q => `${q.id}=${q.answer || ''}${q.note ? ` (${q.note})` : ''}`).join('\n');
      navigator.clipboard.writeText(text);
    }
    function copyExport() {
      const box = document.getElementById('exportText');
      box.select();
      navigator.clipboard.writeText(box.value);
    }
    function clearDraft() {
      if (!confirm('確定清除尚未匯出的答案草稿嗎？')) return;
      answers = {};
      localStorage.removeItem(STORAGE_KEY);
      render();
    }
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, '&quot;');
    }
    render();
  </script>
</body>
</html>
