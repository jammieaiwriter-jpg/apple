<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Apple 備考錯題練習</title>
  <style>
    :root { --primary:#ff6b6b; --secondary:#4ecdc4; --accent:#ffe66d; --bg:#f0f4f8; --text:#2f3e46; --ok:#6bcb77; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Chalkboard SE', 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 520px; padding: 14px; text-align: center; }
    h1 { margin: 8px 0 4px; color: var(--primary); font-size: 1.5rem; }
    .top { color:#667085; font-size:.9rem; margin-bottom: 8px; }
    .card { background:white; border-radius: 18px; padding: 14px; box-shadow: 0 8px 18px rgba(15,23,42,.08); display: grid; gap: 12px; }
    .meta { color:#667085; font-size:.85rem; word-break: break-word; }
    .mistake-img { width:100%; max-height: 420px; object-fit: contain; border:2px solid #eef2f7; border-radius: 12px; background: white; }
    .answer-area { display:grid; gap:10px; }
    .choice-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    .btn { border:0; border-radius:16px; background: var(--secondary); color:white; font-size:1.5rem; padding:16px 10px; min-height:58px; box-shadow: 0 5px 0 #369a93; cursor:pointer; }
    .btn:active { transform: translateY(3px); box-shadow:none; }
    .btn.small { font-size:1rem; padding:10px; min-height:42px; border-radius:12px; }
    .btn.light { background:white; color:var(--text); border:2px solid var(--secondary); box-shadow:0 4px 0 #cbd5e1; }
    .step-row { background:#f8fafc; border:1px solid #e2e8f0; border-radius:14px; padding:10px; display:grid; gap:8px; }
    .step-title { font-weight:700; color:#475569; }
    .step-options { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; }
    .step-options.number { grid-template-columns: repeat(5, 1fr); }
    .picked { background: var(--primary) !important; color:white !important; border-color: var(--primary) !important; }
    input.step-input { width:100%; border:2px solid var(--secondary); border-radius:12px; padding:12px; font-size:1.25rem; text-align:center; }
    .hint { background:#fff9db; border:1px solid #fde68a; color:#7c5800; padding:10px; border-radius:12px; font-size:.95rem; display:none; }
    .hint.show { display:block; }
    .nav { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .result { font-weight:700; min-height: 28px; }
    .ok { color: var(--ok); }
    .bad { color: var(--primary); }
  </style>
</head>
<body>

    <div class="top" id="progress"></div>

      <div class="result" id="result"></div>
      <div class="nav">
        <button class="btn small light" onclick="showHintBox()">提示</button>
        <button class="btn small light" onclick="skipQuestion()">下一題</button>

    </div>

    let current = 0;
    let stepAnswers = [];
    function normalize(value) { return String(value || '').trim().replace(/[，,、]/g, ' ').replace(/\s+/g, ' '); }
    function tokens(q) { return normalize(q.answer).split(' ').filter(Boolean); }
    function isDirectionToken(t) { return ['左','中','右'].includes(t); }
    function isDirectionQuestion(q) { const ts = tokens(q); return ts.length > 0 && ts.every(isDirectionToken); }
    function isChoiceQuestion(q) { return q.answerType === 'choice' && /^[1-4]$/.test(normalize(q.answer)); }
    function render() {
      const q = EXAM_REVIEW_QUESTIONS[current];
      stepAnswers = [];
      document.getElementById('progress').textContent = '第 ' + (current + 1) + ' / ' + EXAM_REVIEW_QUESTIONS.length + ' 題';
      document.getElementById('fileName').textContent = q.file;
      document.getElementById('mistakeImg').src = '錯題/' + encodeURIComponent(q.file);
      document.getElementById('hintBox').textContent = q.hint || '先看題目，再慢慢選。';
      document.getElementById('hintBox').classList.remove('show');
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = 'result';
      if (isChoiceQuestion(q)) renderChoiceAnswer(q);
      else renderStepAnswer(q);
    }
    function renderChoiceAnswer(q) {
      document.getElementById('answerArea').innerHTML = '<div class="choice-grid">' + [1,2,3,4].map(n => '<button class="btn" onclick="checkAnswer(\'' + n + '\')">' + n + '</button>').join('') + '</div>';
    }
    function renderStepAnswer(q) {
      const ts = tokens(q);
      const direction = isDirectionQuestion(q);
      stepAnswers = Array(ts.length).fill('');
      document.getElementById('answerArea').innerHTML = ts.map((_, idx) => {
        if (direction) {
          return '<div class="step-row"><div class="step-title">第 ' + (idx + 1) + ' 格</div><div class="step-options">' + ['左','中','右'].map(v => '<button class="btn small light" data-step="' + idx + '" data-value="' + v + '" onclick="pickStep(' + idx + ',\'' + v + '\')">' + v + '</button>').join('') + '</div></div>';
        }
        return '<div class="step-row"><div class="step-title">第 ' + (idx + 1) + ' 格</div><input class="step-input" inputmode="numeric" data-step-input="' + idx + '" oninput="setStep(' + idx + ', this.value)" placeholder="填答案"></div>';
      }).join('') + '<button class="btn" onclick="submitSteps()">送出</button>';
    }
    function pickStep(idx, value) {
      stepAnswers[idx] = value;
      document.querySelectorAll('[data-step="' + idx + '"]').forEach(btn => btn.classList.toggle('picked', btn.dataset.value === value));
    }
    function setStep(idx, value) { stepAnswers[idx] = value; }
    function submitSteps() { checkAnswer(stepAnswers.map(normalize).join(' ')); }
    function checkAnswer(value) {
      const q = EXAM_REVIEW_QUESTIONS[current];
      const ok = normalize(value) === normalize(q.answer);
      const result = document.getElementById('result');
      if (ok) {
        result.textContent = '答對了，很好！';
        result.className = 'result ok';
        setTimeout(skipQuestion, 750);
      } else {
        result.textContent = '再試一次，慢慢看圖。';
        result.className = 'result bad';
      }
    }
    function showHintBox() { document.getElementById('hintBox').classList.add('show'); }
    function skipQuestion() { current = (current + 1) % EXAM_REVIEW_QUESTIONS.length; render(); }
    function goHome() { current = 0; render(); }
    render();
  </script>
