<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>月光果醬・草稿試聽</title>
  <style>
    :root { color-scheme:dark; --ink:#fff7dc; --soft:#cac5df; --gold:#ffd77a; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100svh; overflow:hidden; font-family:"PingFang TC","Noto Sans TC",sans-serif; color:var(--ink); background:#17162d; }
    .night { min-height:100svh; display:grid; place-items:center; padding:calc(24px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom)); text-align:center; background:radial-gradient(circle at 50% 15%,#514a8a,#242142 55%,#17162d); transition:filter 8s ease,background 8s ease; }
    .night::after { content:""; position:fixed; inset:0; pointer-events:none; background:#05050b; opacity:0; transition:opacity 8s ease; }
    .night.dimmed::after { opacity:.88; }
    .draft-banner { position:fixed; top:0; left:0; right:0; z-index:3; padding:8px 16px; color:#fff; background:#7c3aed; font-size:13px; line-height:1.5; }
    .content { position:relative; z-index:1; width:min(560px,100%); transition:opacity 5s ease; }
    .dimmed .content { opacity:.16; }
    .eyebrow,.status { color:var(--soft); }
    h1 { margin:10px 0 34px; font-size:clamp(30px,9vw,48px); }
    .theme-word { display:flex; justify-content:center; gap:22px; margin:0 auto 48px; }
    .theme-character { display:flex; align-items:center; gap:8px; }
    .theme-hanzi { font-size:clamp(76px,24vw,120px); line-height:1; }
    .theme-zhuyin { writing-mode:vertical-rl; text-orientation:upright; letter-spacing:2px; font-size:clamp(17px,5vw,25px); color:var(--gold); }
    button { min-height:52px; border-radius:18px; padding:13px 20px; font:700 18px inherit; cursor:pointer; }
    .primary { border:0; color:#24213e; background:var(--gold); }
    .secondary { border:1px solid #ffffff44; color:var(--ink); background:#ffffff14; }
    .controls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:18px; transition:opacity .4s ease; }
    .playing:not(.controls-visible) .controls { opacity:0; pointer-events:none; }
    .status { min-height:48px; margin-top:22px; line-height:1.5; }
    .tap-layer { position:fixed; inset:0; z-index:2; display:none; border:0; background:transparent; }
    .dimmed .tap-layer { display:block; }
    .controls-visible .tap-layer { display:none; }
  </style>
</head>
<body>
<div class="draft-banner" id="draftBanner">草稿試聽版・資料載入中</div>
<main class="night controls-visible" id="night">
  <button class="tap-layer" id="tapLayer" aria-label="顯示播放控制"></button>
  <section class="content">
    <div class="eyebrow">今晚的核心詞</div>
    <h1 id="title">星光故事</h1>
    <div class="theme-word" id="themeWord" aria-label="核心詞"></div>
    <button class="primary" id="start" disabled>開始今晚的故事</button>
    <div class="controls" id="controls">
      <button class="secondary" id="pause">暫停</button>
      <button class="secondary" id="resume">繼續</button>
      <button class="secondary" id="restart">重新播放</button>
    </div>
    <p class="status" id="status" aria-live="polite">舒服地躺好，點一下就會自動聽完整篇故事。</p>
  </section>
</main>
<script>
const PROGRESS_KEY = 'apple-bedtime-progress-draft';
const DIM_DELAY_MS = 20000;
const night = document.getElementById('night');
const statusText = document.getElementById('status');
let story;
let state = 'ready';
let preferredVoice;
let resumeTime = 0;
let lastSavedTime = -1;
let dimRemaining = DIM_DELAY_MS;
let dimStartedAt = 0;
let dimTimer;
let controlsTimer;
let playbackId = 0;
let storyAudio;

function setState(next) {
  state = next;
  night.classList.toggle('playing', next === 'playing');
  night.classList.add('controls-visible');
  document.getElementById('start').hidden = next !== 'ready';
  document.getElementById('pause').hidden = next !== 'playing';
  document.getElementById('resume').hidden = next !== 'paused' && next !== 'error';
  document.getElementById('restart').hidden = next === 'ready';
}

function saveProgress() {
  try {
    const time = storyAudio ? storyAudio.currentTime : resumeTime;
    localStorage.setItem(PROGRESS_KEY, JSON.stringify({ storyId: story.id, time }));
  } catch {}
}

function loadProgress() {
  resumeTime = 0;
  try {
    const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY));
    if (saved && saved.storyId === story.id && Number.isFinite(saved.time)) resumeTime = saved.time;
  } catch {}
}

function narration() {
  return [
    { id:'intro', text:story.intro },
    ...story.sections,
    { id:'wind-down-scene', text:story.wind_down.scene },
    { id:'wind-down-breath', text:story.wind_down.breath },
    { id:'wind-down-goodnight', text:story.wind_down.goodnight }
  ];
}

function refreshPreferredVoice() {
  const voices = speechSynthesis.getVoices();
  preferredVoice =
    voices.find(voice => voice.lang === 'zh-TW' && voice.localService) ||
    voices.find(voice => voice.lang === 'zh-TW') ||
    voices.find(voice => /^zh[-_]Hant/i.test(voice.lang)) ||
    voices.find(voice => /^zh/i.test(voice.lang));
}

function startDimTimer() {
  clearTimeout(dimTimer);
  dimStartedAt = Date.now();
  dimTimer = setTimeout(() => {
    night.classList.add('dimmed');
    night.classList.remove('controls-visible');
  }, dimRemaining);
}

function freezeDimTimer() {
  clearTimeout(dimTimer);
  if (!night.classList.contains('dimmed')) dimRemaining = Math.max(0, dimRemaining - (Date.now() - dimStartedAt));
}

function revealControls() {
  night.classList.add('controls-visible');
  clearTimeout(controlsTimer);
  if (state === 'playing' && night.classList.contains('dimmed')) {
    controlsTimer = setTimeout(() => night.classList.remove('controls-visible'), 5000);
  }
}

function combinedAudioUrl() {
  return `audio/${encodeURIComponent(story.id)}.mp3`;
}

function releaseStoryAudio() {
  if (storyAudio) {
    storyAudio.onended = null;
    storyAudio.onerror = null;
    storyAudio.ontimeupdate = null;
    storyAudio.onloadedmetadata = null;
    storyAudio.pause();
    storyAudio.removeAttribute('src');
    storyAudio.load();
    storyAudio = undefined;
  }
}

function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({ title: story.title, artist: '星光故事', album: '草稿試聽' });
    navigator.mediaSession.setActionHandler('play', () => { if (state !== 'playing') resumeStory(); });
    navigator.mediaSession.setActionHandler('pause', () => { if (state === 'playing') pauseStory(); });
  } catch {}
}

function markEnded() {
  resumeTime = 0;
  lastSavedTime = -1;
  saveProgress();
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
  freezeDimTimer();
  revealControls();
  setState('ended');
  statusText.textContent = '故事說完了。晚安。';
}

function playFallbackSpeech() {
  releaseStoryAudio();
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(narration().map(item => item.text).join('\n\n'));
  utterance.lang = 'zh-TW';
  utterance.rate = 0.78;
  utterance.pitch = 1;
  if (preferredVoice) utterance.voice = preferredVoice;
  utterance.onend = () => { if (state === 'playing') markEnded(); };
  utterance.onerror = event => {
    if (event?.error === 'canceled' || state !== 'playing') return;
    freezeDimTimer();
    night.classList.remove('dimmed');
    revealControls();
    setState('error');
    statusText.textContent = '故事停了一下。點「繼續」就能再聽。';
  };
  speechSynthesis.speak(utterance);
}

function playStory(fromTime) {
  playbackId++;
  const activePlaybackId = playbackId;
  releaseStoryAudio();
  speechSynthesis.cancel();
  setState('playing');
  statusText.textContent = '故事正在播放。';
  startDimTimer();
  setupMediaSession();
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  storyAudio = new Audio(combinedAudioUrl());
  storyAudio.preload = 'auto';
  storyAudio.onloadedmetadata = () => {
    if (fromTime > 0 && storyAudio && fromTime < storyAudio.duration - 1) storyAudio.currentTime = fromTime;
  };
  storyAudio.ontimeupdate = () => {
    if (state !== 'playing' || !storyAudio) return;
    if (Math.abs(storyAudio.currentTime - lastSavedTime) >= 5) {
      lastSavedTime = storyAudio.currentTime;
      saveProgress();
    }
  };
  storyAudio.onended = () => { if (activePlaybackId === playbackId) markEnded(); };
  storyAudio.onerror = () => { if (activePlaybackId === playbackId && state === 'playing') playFallbackSpeech(); };
  storyAudio.play().catch(error => {
    if (error.name !== 'AbortError' && activePlaybackId === playbackId && state === 'playing') playFallbackSpeech();
  });
}

function begin() {
  playStory(resumeTime);
}

function pauseStory() {
  if (storyAudio && !storyAudio.paused) {
    storyAudio.pause();
    resumeTime = storyAudio.currentTime;
  }
  if (speechSynthesis.speaking && !speechSynthesis.paused) speechSynthesis.pause();
  saveProgress();
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  freezeDimTimer();
  revealControls();
  setState('paused');
  statusText.textContent = '故事暫停了。';
}

function resumeStory() {
  if (speechSynthesis.paused) {
    setState('playing');
    statusText.textContent = '故事正在播放。';
    startDimTimer();
    speechSynthesis.resume();
    return;
  }
  if (storyAudio && storyAudio.paused && !storyAudio.ended) {
    setState('playing');
    statusText.textContent = '故事正在播放。';
    startDimTimer();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    storyAudio.play().catch(() => playStory(resumeTime));
    return;
  }
  playStory(resumeTime);
}

function restartStory() {
  resumeTime = 0;
  lastSavedTime = -1;
  dimRemaining = DIM_DELAY_MS;
  night.classList.remove('dimmed');
  saveProgress();
  playStory(0);
}

fetch('stories/week02.json').then(response => {
  if (!response.ok) throw new Error('story request failed');
  return response.json();
}).then(data => {
  story = data;
  document.getElementById('draftBanner').textContent =
    `草稿試聽版・${story.review_status ?? '狀態未標示'}・${story.review_note ?? '尚未發布'}`;
  document.getElementById('title').textContent = story.title;
  const themeWord = document.getElementById('themeWord');
  story.theme_word.forEach(item => {
    const character = document.createElement('span');
    const hanzi = document.createElement('span');
    const zhuyin = document.createElement('span');
    character.className = 'theme-character';
    hanzi.className = 'theme-hanzi';
    zhuyin.className = 'theme-zhuyin';
    hanzi.textContent = item.char;
    zhuyin.textContent = item.zhuyin;
    character.append(hanzi, zhuyin);
    themeWord.append(character);
  });
  loadProgress();
  if (resumeTime > 0) statusText.textContent = '上次聽到一半，點一下會從上次的地方繼續。';
  document.getElementById('start').disabled = false;
  setState('ready');
}).catch(() => {
  document.getElementById('draftBanner').textContent = '草稿試聽版・資料載入失敗';
  statusText.textContent = '故事還沒準備好，請稍後重新整理。';
  document.getElementById('start').disabled = true;
  document.getElementById('controls').hidden = true;
});

refreshPreferredVoice();
speechSynthesis.onvoiceschanged = refreshPreferredVoice;
document.getElementById('start').onclick = begin;
document.getElementById('pause').onclick = pauseStory;
document.getElementById('resume').onclick = resumeStory;
document.getElementById('restart').onclick = restartStory;
document.getElementById('tapLayer').onclick = revealControls;
window.addEventListener('beforeunload', () => {
  saveProgress();
  releaseStoryAudio();
  speechSynthesis.cancel();
});
</script>
</body>
</html>
