services:
  - type: web
    name: apple-bedtime-story
    runtime: python
    plan: free
    rootDir: bedtime
    buildCommand: python3 -m py_compile server.py
    startCommand: python3 server.py
    healthCheckPath: /health
    envVars:
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        value: eastasia
      - key: AZURE_SPEECH_VOICE
        value: zh-TW-HsiaoChenNeural
