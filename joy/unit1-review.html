<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joy Unit 1 課後複習</title>
  <style>
    :root{
      --ink:#27313f; --muted:#667085; --paper:#fffdf8; --line:#e7e0d2;
      --accent:#207f71; --accent-dark:#145a51; --sky:#dff0ff; --rose:#ffe4ec; --sun:#ffe9a8; --mint:#dff5e7;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; min-height:100vh; color:var(--ink); padding:18px;
      font-family:ui-rounded,"SF Pro Rounded","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
      background:linear-gradient(180deg,#fffdf8,#f4f9ff);
    }
    .wrap{max-width:760px;margin:0 auto;}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    h1{font-size:clamp(24px,5vw,38px);margin:0;}
    .progress{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-weight:800;color:var(--accent-dark);}
    .tabs{display:flex;gap:8px;margin:16px 0;}
    .tabs button{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:12px;font-weight:800;font-size:17px;min-height:48px;cursor:pointer;}
    .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .card{
      border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px 16px 14px;margin-bottom:14px;
    }
    .card .who{font-weight:900;color:var(--accent-dark);font-size:14px;letter-spacing:.04em;}
    .card .en{font-size:clamp(24px,5.5vw,34px);font-weight:900;line-height:1.15;margin:4px 0 2px;}
    .card .zh{color:var(--muted);font-size:15px;margin-bottom:10px;}
    .kk{color:var(--accent-dark);font-weight:700;font-size:16px;}
    .row{display:flex;flex-wrap:wrap;gap:8px;}
    button.act{border:0;border-radius:10px;padding:12px 16px;min-height:50px;font-weight:900;font-size:16px;cursor:pointer;}
    .listen{background:#fff;color:var(--accent-dark);border:2px solid var(--accent);}
    .start{background:var(--accent);color:#fff;}
    .stop{background:#b54708;color:#fff;}
    button:disabled{opacity:.5;cursor:not-allowed;}
    .out{margin-top:10px;font-size:16px;min-height:24px;color:var(--muted);}
    .stars{font-size:26px;letter-spacing:2px;margin-top:6px;}
    .hide{display:none;}
    .hint{color:var(--muted);font-size:13px;margin:6px 0 14px;}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Joy Unit 1 複習 🎤</h1>
    <div class="progress" id="progress">0 / 0</div>
  </header>
  <p class="hint">用 Safari 分頁開。先按「🔊 聽」聽一次，再按「🎤 開始念」，念完按「⏹ 念好了」就會打星。</p>

  <div class="tabs">
    <button id="tab-dialog" class="active" onclick="switchTab('dialog')">對話</button>
    <button id="tab-vocab" onclick="switchTab('vocab')">單字</button>
  </div>

  <div id="panel-dialog"></div>
  <div id="panel-vocab" class="hide"></div>
</div>

<script>
/* ===== Unit 1 內容（內嵌，不用模組） ===== */
var dialogueLines = [
  {speaker:"Nick", text:"Ahh...", role:"nick", zh:"啊...", scored:false},
  {speaker:"Abby", text:"Ouch!", role:"abby", zh:"哎呀！", scored:false},
  {speaker:"Nick", text:"Are you okay?", role:"nick", zh:"你還好嗎？"},
  {speaker:"Abby", text:"Yes, I am. Thank you.", role:"abby", zh:"我還好，謝謝。"},
  {speaker:"Nick", text:"Hi, I'm Nick. What's your name?", role:"nick", zh:"嗨，我是 Nick。你叫什麼名字？"},
  {speaker:"Abby", text:"Hello, Nick. I'm Abby.", role:"abby", zh:"你好 Nick，我是 Abby。"},
  {speaker:"Fifi", text:"Hello, Nick. Hello, Abby. I'm Fifi.", role:"fifi", zh:"你們好，我是 Fifi。"},
  {speaker:"Nick + Abby", text:"Hi, Fifi!", role:"together", zh:"嗨，Fifi！"},
  {speaker:"Nick", text:"Where are we?", role:"nick", zh:"我們在哪裡？"},
  {speaker:"Abby", text:"I don't know.", role:"abby", zh:"我不知道。"},
  {speaker:"Nick", text:"Look, a door.", role:"nick", zh:"看，一扇門。"},
  {speaker:"Abby", text:"Let's go!", role:"abby", zh:"我們走吧！"},
];
var vocab = [
  {word:"hi", kk:"[haɪ]", zh:"嗨"},
  {word:"hello", kk:"[hɛˈlo]", zh:"哈囉"},
  {word:"I", kk:"[aɪ]", zh:"我"},
  {word:"you", kk:"[ju]", zh:"你"},
  {word:"your", kk:"[jʊr]", zh:"你的"},
  {word:"am", kk:"[æm]", zh:"是（配 I）"},
  {word:"is", kk:"[ɪz]", zh:"是（配 he/she）"},
  {word:"are", kk:"[ɑr]", zh:"是（配 you）"},
  {word:"name", kk:"[nem]", zh:"名字"},
  {word:"what", kk:"[(h)wɑt]", zh:"什麼"},
  {word:"ouch", kk:"[aʊtʃ]", zh:"哎喲"},
  {word:"Nick", kk:"[nɪk]", zh:"尼克"},
  {word:"Abby", kk:"[ˈæbɪ]", zh:"艾比"},
];

/* ===== 評分（內嵌自 unit1.mjs） ===== */
var contractions = {"i'm":"i am","im":"i am","what's":"what is","whats":"what is","don't":"do not","dont":"do not","let's":"let us","lets":"let us"};
function normalizeSpeech(v){
  var s=String(v||"").toLowerCase();
  for(var k in contractions){ s=s.split(k).join(contractions[k]); }
  return s.replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();
}
function scoreSpeech(expected, heard){
  var e=normalizeSpeech(expected).split(" ").filter(Boolean);
  var h=normalizeSpeech(heard).split(" ").filter(Boolean);
  if(!h.length) return {stars:0};
  var cur=0, matched=0;
  for(var i=0;i<e.length;i++){ var at=h.indexOf(e[i],cur); if(at!==-1){matched++;cur=at+1;} }
  var coverage=matched/Math.max(e.length,1);
  var penalty=Math.max(h.length-e.length-2,0)*0.04;
  var pct=Math.max(0,Math.min(1,coverage-penalty));
  var stars=Math.ceil(pct*5+0.25);
  if(matched===e.length) stars=5;
  if(matched===0) stars=1;
  if(stars===0&&h.length) stars=1;
  return {stars:stars};
}

/* ===== 星星儲存 ===== */
var SCORE_KEY="joy-unit1-scores";
function loadScores(){ try{ var a=JSON.parse(localStorage.getItem(SCORE_KEY)||"[]"); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function saveScores(a){ try{ localStorage.setItem(SCORE_KEY, JSON.stringify(a)); }catch(e){} }
var scores = loadScores();

/* ===== 示範語音：只用 speechSynthesis（不用任何 HTML5 Audio） ===== */
function pickVoice(role){
  var vs=(window.speechSynthesis&&speechSynthesis.getVoices&&speechSynthesis.getVoices())||[];
  var en=vs.filter(function(v){return /en[-_]US/i.test(v.lang);});
  if(!en.length) return null;
  var pref = role==="nick"?["Aaron","Arthur","Daniel","Samantha"]
    : role==="fifi"?["Karen","Moira","Samantha","Nicky"]
    : ["Samantha","Nicky","Karen","Aaron"];
  for(var i=0;i<pref.length;i++){ var hit=en.find(function(v){return v.name.indexOf(pref[i])>=0;}); if(hit) return hit; }
  return en.find(function(v){return !/Fred|Albert|Zarvox/i.test(v.name);})||en[0];
}
function speak(text, role){
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.8; u.pitch=1; u.volume=1;
    var v=pickVoice(role); if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ===== 語音辨識：1:1 照搬已驗證可用的 mic-test.html rec() ===== */
function SR(){ return window.SpeechRecognition||window.webkitSpeechRecognition; }
var srSupported = !!SR();
function rec(id, cb){
  var C=SR(),
      out=document.getElementById(id+'-out'),
      start=document.getElementById(id+'-start'),
      stop=document.getElementById(id+'-stop');
  if(!C){ if(out) out.textContent='此瀏覽器不支援語音辨識。'; return; }
  var text='', stopped=false, gotAny=false;
  var r=new C();
  r.lang='en-US'; r.continuous=true; r.interimResults=false;
  r.onaudiostart=function(){ if(out) out.textContent='🎙 收音中…請大聲念'; };
  r.onresult=function(e){
    for(var i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) text+=e.results[i][0].transcript+' '; }
    gotAny=true; if(out) out.textContent='👂 聽到：'+(text.trim()||'(空)');
  };
  r.onerror=function(e){ if(out) out.textContent='🔴 辨識問題：'+(e.error||'未知'); };
  r.onend=function(){
    if(!stopped){ setTimeout(function(){ try{r.start();}catch(_){}} ,120); return; }
    if(start) start.disabled=false;
    if(stop) stop.disabled=true;
    if(!gotAny && out) out.textContent='⏹ 沒收到字，再按一次「開始念」。';
    cb(text.trim());
  };
  if(start) start.disabled=true;
  if(stop){ stop.disabled=false; stop.onclick=function(){ stopped=true; try{r.stop();}catch(_){} setTimeout(function(){ try{r.abort();}catch(_){}} ,1200); }; }
  // iOS：語音合成(聽)和辨識(念)共用音訊子系統。先取消合成、留一點時間讓音訊通道從「播放」釋放成「錄音」，再啟動辨識，
  // 否則先按過「聽」就會收音中卻收不到字。
  try{ window.speechSynthesis.cancel(); }catch(_){}
  if(out) out.textContent='🎙 啟動中…';
  setTimeout(function(){ try{ r.start(); }catch(e){ if(start) start.disabled=false; if(stop) stop.disabled=true; if(out) out.textContent='請再按一次「開始念」。'; } }, 350);
}

/* ===== 畫面 ===== */
function starStr(n){ var s=''; for(var i=0;i<5;i++) s+= i<n?'⭐':'☆'; return s; }

function scoredDialogIndexes(){
  var arr=[]; dialogueLines.forEach(function(l,i){ if(l.scored!==false) arr.push(i); }); return arr;
}
function updateProgress(){
  var idxs=scoredDialogIndexes();
  var done=idxs.filter(function(i){ return (scores[i]||0)>=3; }).length;
  document.getElementById('progress').textContent=done+' / '+idxs.length+' 句';
}

function buildDialog(){
  var html='';
  dialogueLines.forEach(function(l,i){
    var scorable=(l.scored!==false);
    var id='d'+i;
    html+='<div class="card">';
    html+='<div class="who">'+l.speaker+'</div>';
    html+='<div class="en">'+l.text+'</div>';
    html+='<div class="zh">'+l.zh+'</div>';
    html+='<div class="row">';
    html+='<button class="act listen" onclick="speak('+JSON.stringify(l.text).replace(/"/g,'&quot;')+',\''+l.role+'\')">🔊 聽</button>';
    if(scorable){
      html+='<button class="act start" id="'+id+'-start" onclick="recLine('+i+')">🎤 開始念</button>';
      html+='<button class="act stop" id="'+id+'-stop" disabled>⏹ 念好了</button>';
    }
    html+='</div>';
    if(scorable){
      html+='<div class="out" id="'+id+'-out"></div>';
      html+='<div class="stars" id="'+id+'-stars">'+starStr(scores[i]||0)+'</div>';
    }
    html+='</div>';
  });
  document.getElementById('panel-dialog').innerHTML=html;
}
function recLine(i){
  rec('d'+i, function(heard){
    if(!heard) return;
    var s=scoreSpeech(dialogueLines[i].text, heard).stars;
    scores[i]=Math.max(scores[i]||0, s);
    saveScores(scores);
    document.getElementById('d'+i+'-stars').textContent=starStr(s);
    document.getElementById('d'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';
    updateProgress();
  });
}

function buildVocab(){
  var html='';
  vocab.forEach(function(w,i){
    var id='v'+i;
    html+='<div class="card">';
    html+='<div class="en">'+w.word+' <span class="kk">'+w.kk+'</span></div>';
    html+='<div class="zh">'+w.zh+'</div>';
    html+='<div class="row">';
    html+='<button class="act listen" onclick="speak('+JSON.stringify(w.word).replace(/"/g,'&quot;')+',\'together\')">🔊 聽</button>';
    html+='<button class="act start" id="'+id+'-start" onclick="recVocab('+i+')">🎤 開始念</button>';
    html+='<button class="act stop" id="'+id+'-stop" disabled>⏹ 念好了</button>';
    html+='</div>';
    html+='<div class="out" id="'+id+'-out"></div>';
    html+='</div>';
  });
  document.getElementById('panel-vocab').innerHTML=html;
}
function recVocab(i){
  rec('v'+i, function(heard){
    if(!heard) return;
    var s=scoreSpeech(vocab[i].word, heard).stars;
    document.getElementById('v'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';
  });
}

function switchTab(t){
  document.getElementById('tab-dialog').classList.toggle('active', t==='dialog');
  document.getElementById('tab-vocab').classList.toggle('active', t==='vocab');
  document.getElementById('panel-dialog').classList.toggle('hide', t!=='dialog');
  document.getElementById('panel-vocab').classList.toggle('hide', t!=='vocab');
}

buildDialog();
buildVocab();
updateProgress();
// 預先載入語音清單（iOS 有時要先觸發一次）
if(window.speechSynthesis) speechSynthesis.getVoices();
</script>
</body>
</html>
