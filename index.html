    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --bg: #F0F4F8; --text: #2F3E46; --success: #6BCB77; }
        body { font-family: 'Chalkboard SE', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: manipulation; }
        #game-container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; text-align: center; }
        
        .zy-word { display: inline-flex; flex-direction: column; align-items: center; vertical-align: bottom; margin: 0 2px; line-height: 1.1; }
        .zy-top { font-size: 0.75rem; color: #888; height: 0.9rem; font-weight: normal; font-family: sans-serif; }
        .zy-bottom { font-size: 1.6rem; font-weight: bold; }
        
        .mission-panel { display: flex; flex-direction: column; gap: 12px; margin: 15px 0; }
        .mission-item { background: white; border-radius: 20px; padding: 15px; border: 3px solid var(--secondary); display: flex; align-items: center; justify-content: space-between; text-align: left; cursor: pointer; box-shadow: 0 4px 0 var(--secondary); }
        .mission-item:active { transform: translateY(2px); box-shadow: none; }
        .mission-item.mastered { border-color: var(--success); opacity: 0.8; box-shadow: 0 4px 0 var(--success); }
        .check-box { width: 35px; height: 35px; border: 2px solid var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mission-item.mastered .check-box { background: var(--success); color: white; border-color: var(--success); }

        .game-screen { display: none; }
        .game-screen.active { display: block; }
        
        .question-box { background: white; border-radius: 30px; padding: 25px; margin: 15px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { background: var(--secondary); color: white; border: none; border-radius: 18px; padding: 18px; font-size: 1.6rem; cursor: pointer; box-shadow: 0 5px 0 #369a93; min-height: 60px; }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }
        /* SVG 題型按鈕：圖形＋文字排列，背景較淺 */
        .opt-btn svg { border-radius: 6px; display: block; }
        .opt-btn.svg-btn { background: white; color: var(--text); box-shadow: 0 5px 0 #ccc; border: 2px solid var(--secondary); padding: 8px; font-size: 1rem; }
        
        #reward-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #reward-screen.active { display: flex; animation: bounceIn 0.8s; }
        
        .medal-bar { font-size: 0.8rem; margin-top: 3px; color: #aaa; }
        .voice-btn { background: white; border: 2px solid var(--secondary); border-radius: 20px; padding: 8px 20px; font-size: 0.9rem; cursor: pointer; margin-top: 10px; }
        
        /* 強化版時鐘樣式：包含數字 */
        .clock { width: 160px; height: 160px; border: 8px solid #333; border-radius: 50%; position: relative; background: white; margin: 10px auto; }
        .clock-num { position: absolute; font-size: 1.1rem; font-weight: bold; width: 20px; height: 20px; text-align: center; line-height: 20px; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour-hand { width: 8px; height: 40px; background: #333; margin-left: -4px; z-index: 2; }
        .min-hand { width: 5px; height: 60px; background: var(--primary); margin-left: -2.5px; z-index: 1; }
        .clock-center { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #333; border-radius: 50%; transform: translate(-50%, -50%); z-index: 3; }

        .coin-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .coin { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid; }
        .coin-10 { background: #FFD700; border-color: #DAA520; }
        .coin-5 { background: #C0C0C0; border-color: #808080; }
        .coin-1 { background: #CD7F32; border-color: #8B4513; color: white; }

        /* 新增教學畫面樣式 */
        #teaching-screen { display: none; background: white; border-radius: 30px; padding: 30px; margin: 15px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        #teaching-screen.active { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .teaching-content { font-size: 1.4rem; line-height: 1.6; color: var(--text); }
        .start-btn { background: var(--success); color: white; border: none; border-radius: 20px; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 5px 0 #4a9d53; margin-top: 20px; }
        .start-btn:active { transform: translateY(4px); box-shadow: none; }
        .mastered-tag { background: #FFD700; color: #8B4513; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu" class="game-screen active">
        <h1 id="title-area"></h1>
        <p id="sub-area"></p>
        <div id="mastery-info" style="font-size: 0.9rem; color: #666;"></div>
        <div class="mission-panel" id="mission-list"></div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:20px; flex-wrap:wrap;">
            <button onclick="downloadReport()" style="border:1px solid #ccc; background:white; color:#666; padding:5px 10px; border-radius:10px; font-size:0.8rem;">📥 下載學習報表</button>
            <button onclick="exportGameMistakes()" style="border:1px solid #FF6B6B; background:white; color:#FF6B6B; padding:5px 10px; border-radius:10px; font-size:0.8rem;">📤 匯出遊戲錯題</button>
        </div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:8px; flex-wrap:wrap;">
            <button onclick="previewUnit('space')" style="border:1px solid #4ECDC4; background:white; color:#4ECDC4; padding:5px 10px; border-radius:10px; font-size:0.75rem;">🔍 預覽空間題</button>
            <button onclick="previewUnit('coin')" style="border:1px solid #4ECDC4; background:white; color:#4ECDC4; padding:5px 10px; border-radius:10px; font-size:0.75rem;">🔍 預覽錢幣題</button>
            <button onclick="previewUnit('jump')" style="border:1px solid #4ECDC4; background:white; color:#4ECDC4; padding:5px 10px; border-radius:10px; font-size:0.75rem;">🔍 預覽跳數題</button>
            <button onclick="resetData()" style="border:none; background:none; color:#ccc; font-size:0.7rem;">清除紀錄</button>
        </div>
    </div>

    <div id="teaching-screen" class="game-screen">
        <h2 id="teaching-title" style="color: var(--secondary);"></h2>
        <div id="teaching-body" class="teaching-content"></div>
        <button onclick="startChallenge()" class="start-btn" id="start-challenge-btn"></button>
    </div>

    <div id="game" class="game-screen">
        <div id="stars" style="font-size: 1.5rem; margin-bottom: 5px;"></div>
        <h2 id="mode-title" style="color: var(--primary); margin: 0;"></h2>
        <div id="question" class="question-box"></div>
        <div id="options" class="options-grid"></div>
        <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
            <button onclick="speakCurrentQuestion()" class="voice-btn">🔊 <span id="speak-btn-text"></span></button>
            <button onclick="showHint()" class="voice-btn" id="hint-btn">💡 <span id="hint-btn-text">提示</span></button>
            <button onclick="skipQuestion()" class="voice-btn" id="skip-btn" style="color:#aaa; border-color:#ddd;">⏭ 換題</button>
        </div>
        <button onclick="goHome()" id="stop-btn" style="margin-top:15px; border:none; background:none; color:#bbb;"></button>
    </div>
</div>

<div id="reward-screen">
    <h1 style="font-size: 5rem;">📺</h1>
    <h2 id="reward-title"></h2>
    <div style="background:white; padding:25px; border-radius:25px; text-align:center;">
        <p id="reward-text" style="font-size: 1.5rem; margin:0;"></p>
    </div>
    <button class="opt-btn" style="margin-top:30px; background:white; color:var(--text); padding: 15px 40px;" onclick="resetRoundAndReload()" id="next-day-btn"></button>
</div>

<script>
    function zy(zi, py) {
        return `<span class="zy-word"><span class="zy-top">${py||''}</span><span class="zy-bottom">${zi}</span></span>`;
    }

    // teaching 改為陣列，才能用 Math.random()*length 正確隨機取值
    // hints 是「每題生成時綁定」的提示，跟題目內容相關，由 generateQuestion() 設定
    let currentHints = ["再想想看喔！", "仔細看一下題目！", "快要對了，加油！"];

    const ALL_UNITS = [
        {
            id: 'coin',
            title: '💰 '+zy('金','ㄐㄧㄣ')+zy('幣','ㄅㄧˋ')+zy('小','ㄒㄧㄠˇ')+zy('管','ㄍㄨㄢˇ')+zy('家','ㄐㄧㄚ'),
            text: '總共有幾元呢？',
            teaching: [
                "Apple看這裡！錢幣有大有小，顏色也不一樣喔！金色大的是 10 元，銀色的是 5 元，小小的是 1 元。",
                "數錢的祕訣：先把 10 元全部數完，再接著數 5 元和 1 元，這樣最快喔！",
                "偷偷告訴妳，10 元有幾個就是幾十，例如兩個 10 元就是 20，再加上後面的錢就是答案囉！"
            ]
        },
        {
            id: 'jump',
            title: '🐸 '+zy('高','ㄍㄠ')+zy('階','ㄐㄧㄝ')+zy('跳','ㄊㄧㄠˋ')+zy('跳','ㄊㄧㄠˋ')+zy('蛙','ㄨㄚ'),
            text: '問號裡面要填什麼數字呢？',
            teaching: [
                "Apple，小青蛙每次跳的步數都一樣長喔！妳先看看，數字是越來越大還是越來越小？",
                "試著算算看，把旁邊兩個數字相減，就能找出每次跳了幾步！",
                "神祕規律：把問號前面的數字，加上（或減掉）跳躍的步數，就是答案囉！"
            ]
        },
        {
            id: 'reverse',
            title: '🧠 '+zy('逆','ㄋㄧˋ')+zy('向','ㄒㄧㄤˋ')+zy('大','ㄉㄚˋ')+zy('偵','ㄓㄣ')+zy('探','ㄊㄢˋ'),
            text: '問號是什麼數字呢？',
            teaching: [
                "這是一個數字迷宮！Apple，妳先看等號右邊的數字是多少，把它記起來。",
                "想像一下：有一個大數字，拿走了一部分，剩下的就是左邊的小數字。所以問號一定比左邊大喔！",
                "反過來算就對了！如果是「a = ? - b」，那答案就是 a 加上 b！"
            ]
        },
        {
            id: 'clock',
            title: '⏰ '+zy('時','ㄕˊ')+zy('間','ㄐㄧㄢ')+zy('小','ㄒㄧㄠˇ')+zy('偵','ㄓㄣ')+zy('探','ㄊㄢˋ'),
            text: '現在是幾點鐘？',
            teaching: [
                "Apple，看時鐘要先看長長的指針在哪裡！長針在 12 就是整點，長針在 6 就是半點（30分）。",
                "長針決定分鐘，短針決定小時。長針指著 6，就是「點半」！這時候短針停在兩個數字中間，要看比較小的那個喔！",
                "如果短針在 3 和 4 之間，代表是 3 點多，還沒到 4 點！整點時短針會剛好指著某個數字。"
            ]
        },
        {
            id: 'even',
            title: '🔢 '+zy('雙','ㄕㄨㄤ')+zy('數','ㄕㄨˋ')+zy('小','ㄒㄧㄠˇ')+zy('捕','ㄅㄨˇ')+zy('手','ㄕㄡˇ'),

    function startNewRound() {
        // 過濾掉已精通的單元
        const availableInQueue = roundState.unitQueue.filter(id => !roundState.retiredUnits.includes(id));
        
        let nextRound = [];
        
        // 1. 優先位：如果有需要加強的單元，放第一個
        if (roundState.needsPractice && !roundState.retiredUnits.includes(roundState.needsPractice)) {
            nextRound.push(roundState.needsPractice);
            roundState.needsPractice = null; // 取出後清空
        }
        
        // 2. 輪播位：從隊列中找接下來該輪到的單元，補滿 3 個
        for (let id of availableInQueue) {
            if (nextRound.length >= 3) break;
            if (!nextRound.includes(id)) {
                nextRound.push(id);
            }
        }
        
        roundState.roundUnits = nextRound;
        roundState.completedUnits = [];
        
        // 3. 達成輪播：將本輪選中的單元移到 Queue 的最後面
        roundState.unitQueue = roundState.unitQueue.filter(id => !nextRound.includes(id)).concat(nextRound);
        
        safeSaveState();
    }

            const streak = roundState.streaks[u.id] || 0;
            return `
            <div class="mission-item ${isMastered?'mastered':''}" onclick="${isMastered?'':'startUnit(\''+u.id+'\')'}">

        }).join('');
    }

            // ══════════════════════════════
            // 【題庫B】格子圖形移動（PDF填充題，方向+格子位移）

                    for(let r=0;r<5;r++) for(let c=0;c<5;c++)

                    return `<svg width="${size}" height="${size}" style="border:2px solid #eee;border-radius:8px">${bg}</svg>`;
                };
                // 圖案：在左上2×2
                const patterns = [
                    { cells:[[0,0],[0,1],[1,0],[1,1]], name:'左上2×2', color:C },
                    { cells:[[0,1],[0,2],[1,1]], name:'L形上方', color:R },

                    { name:'往上移一格', dx:-1, dc:0, arrow:'↑' },
                ];
                const items = [];
                patterns.forEach(pat => dirs.forEach(dir => {
                    const moved = pat.cells.map(([r,c])=>[r+dir.dx, c+dir.dc]);
                    if(moved.every(([r,c])=>r>=0&&r<5&&c>=0&&c<5)) {
                        // 3個錯誤：反向、90度、不動
                        const w1 = pat.cells.map(([r,c])=>[r-dir.dx, c-dir.dc]).filter(([r,c])=>r>=0&&r<5&&c>=0&&c<5);
                        const w2 = pat.cells.map(([r,c])=>[r+dir.dc, c+dir.dx]).filter(([r,c])=>r>=0&&r<5&&c>=0&&c<5);

                        hint1:'左邊兩個形狀合在一起，看誰在前面，誰在後面？',

                const posQ = Math.random();
                if (posQ < 0.5) {
                    const isRight = Math.random() > 0.5;
                    correctAnswer = isRight ? '右邊' : '左邊';
                    currentHints = [
                        `伸出右手比讚 👍，拇指那邊就是右邊！`,
                        `箭頭：${isRight?'→ 向右':'← 向左'}。`,
                        `答案是「${correctAnswer}」！`
                    ];
                    qEl.innerHTML = `<div style="font-size:5rem">${isRight?'👉':'👈'}</div>
                        <div style="font-size:1rem">${zy('這','ㄓㄜˋ')}${zy('是','ㄕˋ')}${zy('哪','ㄋㄚˇ')}${zy('一','ㄧ')}${zy('邊','ㄅㄧㄢ')}？</div>`;
                    ['左邊','右邊','上面','下面'].sort(()=>0.5-Math.random()).forEach(o=>createOpt(o,o));
                } else {
                    const onTop = Math.random() > 0.5;
                    correctAnswer = onTop ? '上面' : '下面';
                    const animals = [['🐘','🐱'],['🐶','🐱'],['🦊','🐸'],['🐻','🐰']];
                    const [a1,a2] = animals[Math.floor(Math.random()*animals.length)];
                    currentHints = [
                        `看哪隻動物的位置比較高？高的在「上面」！`,
                        `${onTop?a1:a2} 在${onTop?'上':'下'}面，${onTop?a2:a1} 在${onTop?'下':'上'}面！`,
                        `答案是「${correctAnswer}」，${a1} 在 ${a2} 的${correctAnswer}！`
                    ];
                    qEl.innerHTML = `<div style="font-size:3rem;line-height:1.6">${onTop?a1+'\n'+a2:a2+'\n'+a1}</div>
                        <div style="font-size:1rem">${a1}${zy('在','ㄗㄞˋ')}${a2}${zy('的','ㄉㄜ˙')}${zy('哪','ㄋㄚˇ')}${zy('一','ㄧ')}${zy('邊','ㄅㄧㄢ')}？</div>`;
                    ['上面','下面','左邊','右邊'].sort(()=>0.5-Math.random()).forEach(o=>createOpt(o,o));
                }
            }
        } else if (mode === 'reverse') {
            let a = Math.floor(Math.random()*10)+1, b = Math.floor(Math.random()*10)+1;
            correctAnswer = a+b;
            currentHints = [
                `看等號左邊是 ${a}，右邊是「? - ${b}」。問號一定比 ${a} 還要大！`,
                `反過來算：? = ${a} + ${b}，把兩個數字加起來！`,
                `${a} + ${b} = ${correctAnswer}，所以問號是 ${correctAnswer}！`
            ];
            qEl.innerHTML = `<div style="font-size:2.5rem">${a} = ? - ${b}</div>`;
            generateOptions(correctAnswer);
        } else if (mode === 'jump') {
            const steps = [2, 3, 5, -2, -5];
            let s = steps[Math.floor(Math.random()*steps.length)];
            let start = s > 0 ? Math.floor(Math.random()*10)+1 : 25;
            let seq = [0,1,2,3].map(i => start + i*s);
            let e = 1+Math.floor(Math.random()*2);
            correctAnswer = seq[e];
            const dir = s > 0 ? '大' : '小';
            const known = seq.filter((_,i)=>i!==e);
            currentHints = [
                `數字越來越${dir}！每次跳的步數都一樣，先找出規律。`,
                `相鄰兩個數字相差 ${Math.abs(s)}，每次${s>0?'加':'減'} ${Math.abs(s)}。`,
                `問號前面的數字是 ${seq[e-1]}，${seq[e-1]} ${s>0?'+':'-'} ${Math.abs(s)} = ${correctAnswer}！`
            ];
            qEl.innerHTML = `<div style="font-size:1.8rem">${seq.map((n,i)=>i==e?'❓':n).join(' ➡ ')}</div>`;
            generateOptions(correctAnswer);
        }
    }

    function createOpt(val, text) {
        const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = text;
        btn.onclick = () => checkAnswer(val); document.getElementById('options').appendChild(btn);
    }

    function generateOptions(correct) {
        let choices = [correct, correct+5, correct-2, correct+10].filter(c => c>=0);
        [...new Set(choices)].slice(0,4).sort(() => 0.5-Math.random()).forEach(c => createOpt(c,c));
    }

    function showHint() {
        usedHintInCurrentUnit = true;
        usedHintInCurrentQuestion = true;
        hintCountInQuestion++;

        // 提示現在跟「這一題」綁定，每題有自己的三層提示
        const hintText = currentHints[Math.min(hintCountInQuestion - 1, currentHints.length - 1)] || "再想想看！";
        if (hintCountInQuestion >= currentHints.length) {
            document.getElementById('hint-btn').disabled = true;
        }
        
        const openings = ["偷偷告訴妳喔，", "Apple看這裡，", "悄悄跟妳說，", "這是一個小秘密："];
        const randomOpening = openings[Math.floor(Math.random() * openings.length)];
        
        speak(randomOpening + hintText);
        
        const oldHint = document.getElementById('hint-text');
        if (oldHint) oldHint.remove();
        
        const hintDiv = document.createElement('div');
        hintDiv.id = 'hint-text';
        hintDiv.style.color = 'var(--secondary)';
        hintDiv.style.fontSize = '1rem';
        hintDiv.style.marginTop = '10px';
        hintDiv.innerHTML = `💡 <span style="font-size:0.8rem">(提示 ${hintCountInQuestion}/3)</span> ${hintText}`;
        document.getElementById('question').appendChild(hintDiv);
    }

    function checkAnswer(val) {
        if (val == correctAnswer) {
            if (isFirstAttempt) {
                currentStep++;
                updateStars();
                confetti({ particleCount: 50, spread: 40, origin: { y: 0.8 } });
                
                // 檢查是否為「無錯無提示」的一題
                if (!usedHintInCurrentQuestion && errorsInCurrentUnit === 0) {
                    perfectAnswersInUnit++;
                }
            }
            
            speak(["太棒了！", "好厲害喔！", "答對囉！"][Math.floor(Math.random()*3)]);
            
            if (currentStep >= 5) {
                // 單元完成邏輯
                roundState.completedUnits.push(currentUnit.id);
                
                // 檢查是否達成該單元的「完美通關」：5 題全部無錯且無提示
                if (perfectAnswersInUnit === 5) {
                    roundState.streaks[currentUnit.id] = (roundState.streaks[currentUnit.id] || 0) + 1;
                    
                    // 達成 10 次完美通關，正式撤下單元
                    if (roundState.streaks[currentUnit.id] >= 10) {
                        if (!roundState.retiredUnits.includes(currentUnit.id)) {
                            roundState.retiredUnits.push(currentUnit.id);
                        }
                    }
                    // 完美過關，不需要特別加強練習
                    roundState.needsPractice = null;
                } else {
                    // 只要不完美，就標記為下一次需要優先練習的「插隊單元」
                    roundState.streaks[currentUnit.id] = 0;
                    roundState.needsPractice = currentUnit.id;
                }
                
                safeSaveState();
                if (roundState.completedUnits.length >= 3) {
                    setTimeout(showReward, 1000);
                } else {
                    // 單元完成但還沒滿 3 個，回主選單（不重開新輪）
                    setTimeout(goHome, 1000);
                }
            } else { 
                document.getElementById('hint-btn').disabled = false;
                setTimeout(generateQuestion, 1000); 
            }
        } else {
            if (isFirstAttempt) {
                errorsInCurrentUnit++;
                roundState.streaks[currentUnit.id] = 0;
                
                // 紀錄錯誤 (無論有沒有看提示都會紀錄)
                roundState.mistakes.push({
                    unit: currentUnit.id,
                    unitTitle: currentUnit.title.replace(/<[^>]*>/g, '').trim(),
                    time: new Date().toLocaleString(),
                    usedHint: usedHintInCurrentQuestion
                });
                safeSaveState();
            }
            isFirstAttempt = false;
            currentStep = 0; 
            updateStars(); 
            speak(["沒關係，再試一次喔！", "沒關係，我們再想一下！", "沒關係，Apple加油！"][Math.floor(Math.random()*3)]);
            document.getElementById('question').style.background = '#FFEBEB';
            setTimeout(() => { document.getElementById('question').style.background = 'white'; }, 500);
        }
    }

    function skipQuestion() {
        // 換一題：不計分不算錯，直接換下一題
        generateQuestion();
    }

    function previewUnit(unitId) {
        // 直接跳過教學、跳過計分，進入某個單元預覽題目
        currentUnit = ALL_UNITS.find(u => u.id === unitId);
        errorsInCurrentUnit = 0;
        perfectAnswersInUnit = 0;
        usedHintInCurrentUnit = false;
        currentStep = 0;
        document.getElementById('menu').classList.remove('active');
        document.getElementById('teaching-screen').classList.remove('active');
        document.getElementById('game').classList.add('active');
        document.getElementById('mode-title').innerHTML = currentUnit.title + ' <span style="font-size:0.7rem;color:#aaa">預覽</span>';
        updateStars();
        generateQuestion();
    }

    function exportGameMistakes() {
        // 將遊戲錯題記錄匯出為 game-mistakes.json 供 Claude 分析
        if (!roundState.mistakes || roundState.mistakes.length === 0) return;
        const json = JSON.stringify(roundState.mistakes, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'game-mistakes.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function downloadReport() {
        let md = "# 🍎 Apple 數學冒險學習報表\n\n";
        md += `產生時間：${new Date().toLocaleString()}\n\n`;
        
        md += "## 🏆 目前學習進度\n";
        ALL_UNITS.forEach(u => {
            const isRetired = roundState.retiredUnits.includes(u.id);
            const streak = roundState.streaks[u.id] || 0;
            md += `* ${u.title.replace(/<[^>]*>/g, '').trim()}：${isRetired ? '✅ 已精通' : `進行中 (完美連勝: ${streak}/10)`}\n`;
        });
        
        md += "\n## ❌ 錯誤紀錄回饋\n";
        if (roundState.mistakes.length === 0) {
            md += "目前沒有任何錯誤紀錄，表現得太棒了！\n";
        } else {
            md += "以下是 Apple 在挑戰過程中答錯的題目（包含「沒看提示」與「看了提示」）：\n\n";
            const grouped = {};
            roundState.mistakes.forEach(m => {
                if (!grouped[m.unitTitle]) grouped[m.unitTitle] = [];
                grouped[m.unitTitle].push(m);
            });
            
            for (let unit in grouped) {
                md += `### ${unit}\n`;
                md += `* 累計答錯：${grouped[unit].length} 次\n`;
                grouped[unit].forEach(m => {
                    md += `  - [${m.time}] ${m.usedHint ? '⚠️ 看了提示還是答錯' : '❌ 沒看提示就答錯'}\n`;
                });
                md += "\n";
            }
        }
        
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Apple學習報表_${new Date().toLocaleDateString().replace(/\//g, '-')}.md`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function speak(t) { 
        if(window.speechSynthesis) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang='zh-TW'; 
            u.rate=0.9;
            u.pitch=1.2;
            window.speechSynthesis.speak(u); 
        } 
    }
    function speakCurrentQuestion() { 
        speak(currentUnit.text); 
    }

    function updateStars() { document.getElementById('stars').innerText = '⭐'.repeat(currentStep) + '⚪'.repeat(5 - currentStep); }
    function goHome() {
        document.getElementById('game').classList.remove('active');
        document.getElementById('teaching-screen').classList.remove('active');
        document.getElementById('menu').classList.add('active');
        // 每次回主選單都重新判斷：如果三個單元都完成，自動開新輪
        const allDone = roundState.roundUnits.length > 0 &&
            roundState.roundUnits.every(id => roundState.completedUnits.includes(id));
        if (allDone) {
            startNewRound();
        }
        renderMissions();
    }
    function showReward() { document.getElementById('reward-screen').classList.add('active'); confetti({ particleCount: 500, spread: 120 }); speak("大成功！你可以玩平板十五分鐘囉！"); }
    function resetRoundAndReload() {
        try {
            localStorage.removeItem('apple_math_round');
        } catch (e) {}
        location.reload();
    }
    function resetData() { 
        if(confirm("確定要清除 Apple 的紀錄嗎？")) { 
            try {
                localStorage.clear(); 
            } catch (e) {}
            location.reload(); 
        } 
    }

    window.onload = initPage;
</script>
