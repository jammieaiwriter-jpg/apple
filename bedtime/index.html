<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Apple 的星光故事</title>
  <style>
    :root { color-scheme:dark; --ink:#fff7dc; --soft:#cac5df; --gold:#ffd77a; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100svh; font-family:"PingFang TC","Noto Sans TC",sans-serif; color:var(--ink); background:#17162d; }
    .night { min-height:100svh; display:grid; place-items:center; padding:calc(24px + env(safe-area-inset-top)) 20px calc(32px + env(safe-area-inset-bottom)); text-align:center; background:radial-gradient(circle at 50% 15%,#514a8a,#242142 55%,#17162d); transition:filter 8s ease,background 8s ease; }
    .night::after { content:""; position:fixed; inset:0; pointer-events:none; background:#05050b; opacity:0; transition:opacity 8s ease; }
    .night.dimmed::after { opacity:.88; }
    .content { position:relative; z-index:1; width:min(620px,100%); transition:opacity 5s ease; }
    .dimmed .content { opacity:.16; }
    .eyebrow,.status { color:var(--soft); }
    h1 { margin:10px 0 34px; font-size:clamp(30px,9vw,48px); }
    .theme-word { display:flex; justify-content:center; gap:22px; margin:0 auto 48px; }
    .theme-character { display:flex; align-items:center; gap:8px; }
    .theme-hanzi { font-size:clamp(76px,24vw,120px); line-height:1; }
    .theme-zhuyin { position:relative; display:flex; flex-direction:column; justify-content:center; min-width:1.15em; line-height:1; font-size:clamp(17px,5vw,25px); color:var(--gold); }
    .theme-tone { position:absolute; right:-.72em; bottom:0; }
    .theme-tone.neutral { top:-.2em; bottom:auto; }
    button { min-height:52px; border-radius:18px; padding:13px 20px; font:700 18px inherit; cursor:pointer; }
    .primary { border:0; color:#24213e; background:var(--gold); }
    .secondary { border:1px solid #ffffff44; color:var(--ink); background:#ffffff14; }
    .controls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:18px; transition:opacity .4s ease; }
    .playing:not(.controls-visible) .controls { opacity:0; pointer-events:none; }
    .status { min-height:48px; margin-top:22px; line-height:1.5; }
    .tap-layer { position:fixed; inset:0; z-index:2; display:none; border:0; background:transparent; }
    .dimmed .tap-layer { display:block; }
    .controls-visible .tap-layer { display:none; }
    .podcast { margin-top:52px; padding-top:28px; border-top:1px solid #ffffff24; text-align:left; }
    .podcast h2 { margin:0 0 6px; font-size:24px; }
    .podcast-intro { margin:0 0 18px; color:var(--soft); line-height:1.5; }
    .podcast-list { display:grid; gap:10px; }
    .episode { width:100%; display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:12px; min-height:72px; padding:12px 14px; border:1px solid #ffffff25; border-radius:18px; color:var(--ink); background:#ffffff0d; text-align:left; }
    .episode:disabled { cursor:default; opacity:.5; }
    .episode.active { border-color:var(--gold); background:#ffd77a18; }
    .episode-week { color:var(--gold); font-size:13px; font-weight:700; }
    .episode-title { display:block; margin-bottom:4px; font-size:17px; font-weight:700; }
    .episode-theme { color:var(--soft); font-size:13px; }
    .episode-status { padding:5px 8px; border-radius:999px; color:var(--soft); background:#ffffff12; font-size:12px; white-space:nowrap; }
    .episode-pronunciation { display:flex; align-items:center; gap:9px; padding-right:5px; }
    .episode-pronunciation .theme-character { gap:3px; }
    .episode-pronunciation .theme-hanzi { font-size:28px; }
    .episode-pronunciation .theme-zhuyin { font-size:11px; }
    .episode.active .episode-status { color:#24213e; background:var(--gold); }
    .playing .podcast { display:none; }
  </style>
</head>
<body>
<main class="night controls-visible" id="night">
  <button class="tap-layer" id="tapLayer" aria-label="顯示播放控制"></button>
  <section class="content">
    <div class="eyebrow" id="eyebrow">今晚的核心詞</div>
    <h1 id="title">星光故事</h1>
    <div class="theme-word" id="themeWord" aria-label="核心詞"></div>
    <button class="primary" id="start">開始今晚的故事</button>
    <div class="controls" id="controls">
      <button class="secondary" id="pause">暫停</button>
      <button class="secondary" id="resume">繼續</button>
      <button class="secondary" id="restart">重新播放</button>
    </div>
    <p class="status" id="status" aria-live="polite">舒服地躺好，點一下就會自動聽完整篇故事。</p>
    <section class="podcast" aria-labelledby="podcastTitle">
      <h2 id="podcastTitle">第一季故事</h2>
      <p class="podcast-intro">今晚主打與森林裡即將登場的十二道星光。</p>
      <div class="podcast-list" id="podcastList"></div>
    </section>
  </section>
</main>
<script>
const CURRENT_STORY_URL = 'stories/current.json';
const CATALOG_URL = 'stories/catalog.json';
const PROGRESS_KEY = 'apple-bedtime-progress-v1';
const LAST_PLAYED_KEY = 'apple-bedtime-last-played-v1';
const ROTATION_KEY = 'apple-bedtime-rotation-v1';
const DIM_DELAY_MS = 20000;
const SECTION_PAUSE_MS = 1800;
const BEFORE_WIND_DOWN_PAUSE_MS = 2500;
const WIND_DOWN_PAUSE_MS = 3000;
const night = document.getElementById('night');
const statusText = document.getElementById('status');
let story;
let currentStoryId;
let tonightStoryId;
let catalog;
const storyCache = {};
let state = 'ready';
let currentSection = 0;
let completedSection = -1;
let preferredVoice;
let dimRemaining = DIM_DELAY_MS;
let dimStartedAt = 0;
let dimTimer;
let controlsTimer;
let speakTimer;
let pauseTimer;
let playbackId = 0;

function setState(next) {
  state = next;
  night.classList.toggle('playing', next === 'playing');
  night.classList.add('controls-visible');
  document.getElementById('start').hidden = next !== 'ready';
  document.getElementById('pause').hidden = next !== 'playing';
  document.getElementById('resume').hidden = next !== 'paused' && next !== 'error';
  document.getElementById('restart').hidden = next === 'ready';
}

function saveProgress() {
  try {
    localStorage.setItem(PROGRESS_KEY, JSON.stringify({ date: todayKey(), storyId:story.id, completedSection }));
  } catch {}
}

function loadProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY));
    if (saved && saved.date === todayKey() && saved.storyId === story.id && Number.isInteger(saved.completedSection)) {
      completedSection = saved.completedSection;
    }
  } catch {}
  currentSection = completedSection >= 0 && completedSection < story.sections.length - 1
    ? completedSection + 2
    : 0;
}

function dateKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function todayKey() {
  return dateKey(new Date());
}

function yesterdayKey() {
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  return dateKey(yesterday);
}

function saveCompletion() {
  try {
    localStorage.setItem(LAST_PLAYED_KEY, JSON.stringify({
      date: todayKey(),
      storyId: story.id,
      storyTitle: story.title
    }));
  } catch {}
}

function completionStatus() {
  try {
    const completed = JSON.parse(localStorage.getItem(LAST_PLAYED_KEY));
    if (!completed || completed.storyId !== story.id) return '';
    if (completed.date === todayKey()) return `今晚已聽完：${completed.storyTitle} ✓`;
    if (completed.date === yesterdayKey()) return `昨晚已聽：${completed.storyTitle} ✓`;
  } catch {}
  return '';
}

function narration() {
  return [
    { id:'intro', text:story.intro },
    ...story.sections,
    { id:'wind-down-scene', text:story.wind_down.scene },
    { id:'wind-down-breath', text:story.wind_down.breath },
    { id:'wind-down-goodnight', text:story.wind_down.goodnight }
  ];
}

function episodeStories(episode) {
  return (episode.stories && episode.stories.length)
    ? episode.stories
    : [{ id: episode.id, title: episode.title, status: episode.status, available: episode.available }];
}

function storyStatus(entry) {
  if (entry.id === tonightStoryId) return '今晚播放';
  if (entry.status === 'pending_adult_review') return '草稿試聽';
  if (entry.status === 'adult_verified') return '已審閱';
  return '規劃中';
}

function episodeForStory(id) {
  return catalog.episodes.find(episode =>
    episode.id === id || episodeStories(episode).some(entry => entry.id === id)
  );
}

function activeEpisode() {
  return episodeForStory(currentStoryId) || catalog.episodes[0];
}

function weekRotationPool(episode) {
  return episodeStories(episode).filter(entry =>
    entry.available && entry.status === 'adult_verified' && storyCache[entry.id]
  );
}

function pickTonight() {
  const episode = activeEpisode();
  const pool = weekRotationPool(episode);
  if (!pool.length) {
    return { story: storyCache[currentStoryId], episode };
  }
  let index = 0;
  try {
    const saved = JSON.parse(localStorage.getItem(ROTATION_KEY));
    if (saved && saved.week === episode.week && Number.isInteger(saved.index)) {
      index = saved.date === todayKey() ? saved.index : saved.index + 1;
    }
  } catch {}
  index = ((index % pool.length) + pool.length) % pool.length;
  try {
    localStorage.setItem(ROTATION_KEY, JSON.stringify({ date: todayKey(), week: episode.week, index }));
  } catch {}
  return { story: storyCache[pool[index].id], episode };
}

function fetchJson(url) {
  return fetch(url, { cache:'no-store' }).then(response => {
    if (!response.ok) throw new Error(`request failed: ${url}`);
    return response.json();
  });
}

function splitZhuyin(zhuyin) {
  const tone = zhuyin.match(/[ˊˇˋ˙]/)?.[0] || '';
  return { symbols: [...zhuyin.replace(/[ˊˇˋ˙]/g, '')], tone };
}

function createPronouncedCharacter(item) {
  const character = document.createElement('span');
  const hanzi = document.createElement('span');
  const zhuyin = document.createElement('span');
  const tone = document.createElement('span');
  const pronunciation = splitZhuyin(item.zhuyin);
  character.className = 'theme-character';
  hanzi.className = 'theme-hanzi';
  zhuyin.className = 'theme-zhuyin';
  tone.className = `theme-tone${pronunciation.tone === '˙' ? ' neutral' : ''}`;
  hanzi.textContent = item.char;
  pronunciation.symbols.forEach(symbol => {
    const part = document.createElement('span');
    part.textContent = symbol;
    zhuyin.append(part);
  });
  tone.textContent = pronunciation.tone;
  zhuyin.append(tone);
  character.append(hanzi, zhuyin);
  return character;
}

function renderPodcastList() {
  const podcastList = document.getElementById('podcastList');
  podcastList.replaceChildren();
  catalog.episodes.forEach(episode => {
    const entries = episodeStories(episode);
    entries.forEach((entry, indexInWeek) => {
      const button = document.createElement('button');
      const label = document.createElement('span');
      const details = document.createElement('span');
      const title = document.createElement('span');
      const theme = document.createElement('span');
      const pronunciation = document.createElement('span');
      const episodeState = document.createElement('span');
      button.className = `episode${entry.id === story.id ? ' active' : ''}`;
      button.disabled = !entry.available;
      button.setAttribute('aria-label', `${episode.week} ${entry.title}，${storyStatus(entry)}`);
      label.className = 'episode-week';
      details.className = 'episode-details';
      title.className = 'episode-title';
      theme.className = 'episode-theme';
      pronunciation.className = 'episode-pronunciation';
      episodeState.className = 'episode-status';
      label.textContent = indexInWeek === 0 ? episode.week : '';
      title.textContent = entry.title;
      theme.textContent = `核心詞：${episode.theme}`;
      episodeState.textContent = storyStatus(entry);
      if (indexInWeek === 0) {
        episode.theme_word.forEach(item => pronunciation.append(createPronouncedCharacter(item)));
      }
      details.append(title, theme);
      button.append(label, details, pronunciation, episodeState);
      if (entry.available) button.onclick = () => selectEpisode(entry);
      podcastList.append(button);
    });
  });
}

function showStory(selectedStory, message, resetProgress = true) {
  playbackId++;
  clearTimeout(speakTimer);
  clearTimeout(pauseTimer);
  speechSynthesis.cancel();
  story = selectedStory;
  if (resetProgress) {
    completedSection = -1;
    currentSection = 0;
  }
  dimRemaining = DIM_DELAY_MS;
  night.classList.remove('dimmed');
  document.getElementById('title').textContent = story.title;
  const episode = episodeForStory(story.id);
  document.getElementById('eyebrow').textContent = episode
    ? `本週主題 · ${episode.week} ${episode.theme}`
    : '今晚的核心詞';
  const themeWord = document.getElementById('themeWord');
  themeWord.replaceChildren();
  story.theme_word.forEach(item => {
    themeWord.append(createPronouncedCharacter(item));
  });
  statusText.textContent = message;
  setState('ready');
  renderPodcastList();
}

function selectEpisode(entry) {
  const selectedStory = storyCache[entry.id];
  if (!selectedStory) {
    statusText.textContent = '這一集暫時無法載入，請稍後再試。';
    return;
  }
  const message = entry.status === 'pending_adult_review'
    ? `草稿試聽：${entry.title}。`
    : `正在播放：${entry.title}。`;
  showStory(selectedStory, message);
  begin(0);
}

function preloadAvailableStories() {
  const seen = new Set();
  const targets = [];
  catalog.episodes.forEach(episode => {
    episodeStories(episode).forEach(entry => {
      if (entry.available && !seen.has(entry.id)) {
        seen.add(entry.id);
        targets.push(entry.id);
      }
    });
  });
  return Promise.all(targets.map(id =>
    fetchJson(`stories/${id}.json`).then(data => {
      storyCache[id] = data;
    })
  ));
}

function refreshPreferredVoice() {
  const voices = speechSynthesis.getVoices();
  const zhTw = voices.filter(voice => voice.lang === 'zh-TW');
  const isHighQuality = voice =>
    /premium|enhanced|neural|natural|美佳|美嘉|Meijia|Yating|Hanhan|Siri/i.test(`${voice.name} ${voice.voiceURI}`);
  preferredVoice =
    zhTw.find(isHighQuality) ||
    zhTw.find(voice => voice.localService) ||
    zhTw[0] ||
    voices.find(voice => /^zh[-_]Hant/i.test(voice.lang)) ||
    voices.find(voice => /^zh/i.test(voice.lang));
}

function pauseBeforeNext(nextIndex, activePlaybackId) {
  currentSection = nextIndex;
  const firstWindDownIndex = story.sections.length + 1;
  const delay = nextIndex === firstWindDownIndex
    ? BEFORE_WIND_DOWN_PAUSE_MS
    : nextIndex > firstWindDownIndex
      ? WIND_DOWN_PAUSE_MS
      : SECTION_PAUSE_MS;
  clearTimeout(pauseTimer);
  pauseTimer = setTimeout(() => speakFrom(nextIndex, activePlaybackId), delay);
}

function startDimTimer() {
  clearTimeout(dimTimer);
  dimStartedAt = Date.now();
  dimTimer = setTimeout(() => {
    night.classList.add('dimmed');
    night.classList.remove('controls-visible');
  }, dimRemaining);
}

function freezeDimTimer() {
  clearTimeout(dimTimer);
  if (!night.classList.contains('dimmed')) dimRemaining = Math.max(0, dimRemaining - (Date.now() - dimStartedAt));
}

function revealControls() {
  night.classList.add('controls-visible');
  clearTimeout(controlsTimer);
  if (state === 'playing' && night.classList.contains('dimmed')) {
    controlsTimer = setTimeout(() => night.classList.remove('controls-visible'), 5000);
  }
}

function speakFrom(index, activePlaybackId) {
  if (activePlaybackId !== playbackId || state !== 'playing') return;
  const items = narration();
  if (index >= items.length) {
    completedSection = story.sections.length - 1;
    saveProgress();
    saveCompletion();
    freezeDimTimer();
    revealControls();
    setState('ended');
    statusText.textContent = `今晚已聽完：${story.title} ✓ 晚安。`;
    return;
  }
  currentSection = index;
  const utterance = new SpeechSynthesisUtterance(items[index].text);
  utterance.lang = 'zh-TW';
  utterance.rate = 0.78;
  utterance.pitch = 1;
  if (preferredVoice) utterance.voice = preferredVoice;
  utterance.onend = () => {
    if (activePlaybackId !== playbackId || state !== 'playing') return;
    if (index >= 1 && index <= story.sections.length) {
      completedSection = index - 1;
      saveProgress();
    }
    pauseBeforeNext(index + 1, activePlaybackId);
  };
  utterance.onerror = event => {
    if (event.error === 'canceled' || activePlaybackId !== playbackId || state !== 'playing') return;
    freezeDimTimer();
    night.classList.remove('dimmed');
    revealControls();
    setState('error');
    statusText.textContent = '故事停了一下。點「繼續」就能從這一段再聽。';
  };
  speechSynthesis.speak(utterance);
}

function begin(index) {
  playbackId++;
  clearTimeout(speakTimer);
  clearTimeout(pauseTimer);
  speechSynthesis.cancel();
  setState('playing');
  statusText.textContent = '故事正在播放。';
  startDimTimer();
  const activePlaybackId = playbackId;
  speakTimer = setTimeout(() => speakFrom(index, activePlaybackId), 80);
}

function pauseStory() {
  playbackId++;
  clearTimeout(speakTimer);
  clearTimeout(pauseTimer);
  speechSynthesis.cancel();
  freezeDimTimer();
  revealControls();
  setState('paused');
  statusText.textContent = '故事暫停了。';
}

function resumeStory() {
  begin(currentSection);
}

function restartStory() {
  completedSection = -1;
  currentSection = 0;
  dimRemaining = DIM_DELAY_MS;
  night.classList.remove('dimmed');
  saveProgress();
  begin(0);
}

Promise.all([fetchJson(CURRENT_STORY_URL), fetchJson(CATALOG_URL)]).then(([current, loadedCatalog]) => {
  catalog = loadedCatalog;
  if (!current.story || !/^[a-z0-9-]+$/.test(current.story)) throw new Error('current story pointer invalid');
  currentStoryId = current.story;
  return preloadAvailableStories();
}).then(() => {
  const tonight = pickTonight();
  story = tonight.story || storyCache[currentStoryId];
  if (!story) throw new Error('current story missing from cache');
  tonightStoryId = story.id;
  loadProgress();
  const completedStatus = completionStatus();
  const message = completedStatus || (currentSection > 0
    ? '今晚聽到一半，點一下會從下一段繼續。'
    : '舒服地躺好，點一下就會自動聽完整篇故事。');
  showStory(story, message, false);
}).catch(() => {
  statusText.textContent = '故事還沒準備好，請稍後重新整理。';
  document.getElementById('start').disabled = true;
});

refreshPreferredVoice();
speechSynthesis.onvoiceschanged = refreshPreferredVoice;
document.getElementById('start').onclick = () => begin(currentSection);
document.getElementById('pause').onclick = pauseStory;
document.getElementById('resume').onclick = resumeStory;
document.getElementById('restart').onclick = restartStory;
document.getElementById('tapLayer').onclick = revealControls;
document.addEventListener('visibilitychange', () => { if (document.hidden && state === 'playing') pauseStory(); });
window.addEventListener('beforeunload', () => {
  clearTimeout(speakTimer);
  clearTimeout(pauseTimer);
  speechSynthesis.cancel();
});
</script>
</body>
</html>
